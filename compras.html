<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>BSM Cotação Mobile</title>
  <meta name="theme-color" content="#0c223a" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root{
      --bg:#0f2b4a;
      --bg2:#0c223a;
      --card:#173a63;
      --card2:#123250;
      --text:#ffffff;
      --muted:#dbeafe;
      --blue:#1d4ed8;
      --green:#15803d;
      --red:#b91c1c;
      --yellow:#b45309;
      --gray:#374151;
      --border:rgba(255,255,255,.10);
      --shadow:0 10px 28px rgba(0,0,0,.22);
      --radius:18px;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body { min-height: 100vh; }

    .topo {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(180deg, #0c223a 0%, #102944 100%);
      padding: 16px 14px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,0,0,.22);
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 14px;
      padding-bottom: 36px;
    }

    .hidden { display: none !important; }

    .card, .box, .dash, .salvo {
      background: linear-gradient(180deg, var(--card) 0%, var(--card2) 100%);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card, .box, .dash, .salvo { padding: 14px; }

    .login-wrap {
      max-width: 430px;
      margin: 30px auto;
    }

    .login-wrap h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 24px;
    }

    .topbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .box label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 700;
      color: var(--muted);
    }

    input, select, textarea {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 16px;
      background: rgba(255,255,255,.98);
      color: #111827;
      margin-top: 4px;
    }

    input[readonly] { background: #e5eefc; }

    .acoes-topo {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      min-height: 50px;
      box-shadow: 0 6px 18px rgba(0,0,0,.18);
    }

    .btn { background: #111827; color: #fff; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-blue { background: var(--blue); color: #fff; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-yellow { background: var(--yellow); color: #fff; }
    .btn-gray { background: var(--gray); color: #fff; }

    .status-save {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--gray);
      font-weight: 700;
      min-height: 50px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .dash { text-align: center; }

    .dash span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .dash strong {
      display: block;
      font-size: 24px;
    }

    .grid-produtos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 14px;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .topo-produto {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 10px;
      margin-bottom: 12px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      background: rgba(255,255,255,0.03);
    }

    th, td {
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      vertical-align: middle;
    }

    th {
      background: rgba(0,0,0,0.18);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .aprovado td {
      background: #08294d !important;
      color: #ffffff !important;
      font-weight: 700 !important;
      border-top: 1px solid #1d4ed8;
      border-bottom: 1px solid #1d4ed8;
    }

    .menor td {
      box-shadow: inset 0 0 0 2px #f1c40f;
    }

    .ok-check {
      width: 22px !important;
      height: 22px;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      font-weight: 700;
      line-height: 1.4;
    }

    .aprovada-geral {
      border: 2px solid #1d4ed8;
      box-shadow: 0 0 0 2px rgba(29,78,216,.18);
    }

    .chip {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
    }

    .chip-pendente {
      background: #fef3c7;
      color: #92400e;
    }

    .chip-aprovada {
      background: #dbeafe;
      color: #1e40af;
    }

    .salvo strong {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .salvo > div {
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .salvo button {
      margin-top: 8px;
      margin-right: 6px;
    }

    .lista-xml {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .xml-item {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 12px;
    }

    .xml-item strong {
      display: block;
      margin-bottom: 6px;
    }

    .nao-imprimir { margin-top: 16px; }

    @media (max-width: 768px) {
      .container { padding: 10px; }
      .topo { font-size: 18px; padding: 14px 10px; }
      .topbar { grid-template-columns: 1fr; }
      .dashboard { grid-template-columns: repeat(2, 1fr); }
      .grid-produtos { grid-template-columns: 1fr; }
      .topo-produto { grid-template-columns: 1fr; }

      .acoes-topo {
        position: sticky;
        top: 60px;
        z-index: 40;
        background: rgba(15,43,74,.96);
        backdrop-filter: blur(8px);
        padding: 8px 0 10px;
        margin-bottom: 12px;
      }

      .acoes-topo button,
      .acoes-topo .status-save {
        flex: 1 1 calc(50% - 10px);
      }
    }

    @media (max-width: 480px) {
      .dashboard { grid-template-columns: 1fr 1fr; }
      .acoes-topo button,
      .acoes-topo .status-save { flex: 1 1 100%; }
      .card h3 { font-size: 17px; }
    }

    @media print {
      .acoes-topo, .lista-salvos, .nao-imprimir, #painelUsuarios { display: none !important; }
      body { background: white; color: black; }
      .card, .box, .dash, .salvo {
        background: white;
        color: black;
        border: 1px solid #ccc;
        box-shadow: none;
      }
      .topo {
        position: static;
        background: white;
        color: black;
        border-bottom: 1px solid #ccc;
        box-shadow: none;
      }
      .aprovado td {
        background: #dbeafe !important;
        color: #000 !important;
        font-weight: 700 !important;
      }
      input, select {
        background: white !important;
        color: black !important;
        border: 1px solid #ccc !important;
      }
    }
  </style>
</head>
<body>
  <div class="topo">BSM SISTEMA DE COTAÇÃO DE PREÇOS - MOBILE TOP</div>

  <div id="telaLogin" class="container">
    <div class="card login-wrap">
      <h2>Login do sistema</h2>
      <label>Usuário</label>
      <input type="text" id="loginUsuario" placeholder="Usuário" />
      <label>Senha</label>

      <button class="btn-blue" onclick="fazerLogin()">Entrar</button>

  </div>

  <div id="app" class="container hidden">
    <div class="acoes-topo">
      <button class="btn-gray" onclick="logout()">Sair</button>
      <button class="btn-blue" onclick="adicionarProduto()">➕ Adicionar Produto</button>
      <button class="btn-green" onclick="salvarManual()">💾 Salvar (OK)</button>
      <button class="btn-yellow" onclick="aprovarFornecedorEmLote()">✅ Aprovar Lote</button>
      <button class="btn" onclick="carregarDadosDaData()">🔄 Recarregar Data</button>
      <button class="btn-red" onclick="limparDadosDaData()">🗑️ Limpar Data</button>
      <button class="btn" onclick="window.print()">🖨️ Imprimir</button>
      <button class="btn-green hidden" id="btnAprovarCotacao" onclick="aprovarCotacaoAdmin()">✅ Aprovar Cotação</button>
      <button class="btn-gray hidden" id="btnRelatorioAprovados" onclick="abrirRelatorioAprovados()">📄 Relatório Aprovados</button>
      <button class="btn-gray hidden" id="btnUsuarios" onclick="togglePainelUsuarios()">👥 Usuários</button>
      <button class="btn-green" onclick="enviarRelatorioAtualParaComprador()">📲 Enviar ao Comprador</button>
      <span id="statusSalvar" class="status-save">🟢 Salvo</span>
    </div>

    <div class="topbar">
      <div class="box">
        <label>Data</label>
        <input type="date" id="dataReferencia">
      </div>

      <div class="box">
        <label>Comprador</label>
        <input type="text" id="compradorNome" readonly>
      </div>

      <div class="box">
        <label>WhatsApp do comprador</label>
        <input type="text" id="compradorWhatsapp" placeholder="Ex.: 5531999999999">
      </div>

      <div class="box">
        <label>Responsável interno</label>
        <input type="text" id="responsavel" placeholder="Responsável">
      </div>

      <div class="box">
        <label>Observação</label>
        <input type="text" id="observacao" placeholder="Observação da cotação">
      </div>

      <div class="box">
        <label>Aprovar fornecedor em lote</label>
        <select id="fornecedorLote">
          <option value="">Selecione o fornecedor</option>
        </select>
      </div>

      <div class="box hidden" id="boxFiltroComprador">
        <label>Filtrar comprador</label>
        <select id="filtroComprador" onchange="carregarCotacaoDoCompradorAdmin()">
          <option value="">Selecione</option>
        </select>
      </div>
    </div>

    <div class="dashboard">
      <div class="dash"><span>Data</span><strong id="dashData">-</strong></div>
      <div class="dash"><span>Produtos</span><strong id="dashProdutos">0</strong></div>
      <div class="dash"><span>Aprovados</span><strong id="dashAprovados">0</strong></div>
      <div class="dash"><span>Total aprovado</span><strong id="dashTotal">0,00</strong></div>
      <div class="dash"><span>Status</span><strong id="dashStatus">PENDENTE</strong></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div><strong>Usuário logado:</strong> <span id="usuarioLogadoInfo">-</span></div>
      <div><strong>Perfil:</strong> <span id="perfilLogadoInfo">-</span></div>
      <div><strong>Última aprovação:</strong> <span id="infoAprovacao">-</span></div>
      <div id="chipStatusCotacao" class="chip chip-pendente">PENDENTE</div>
    </div>

    <div class="box nao-imprimir" style="margin-bottom:16px;">
      <h3 style="margin-top:0;">📎 XML da nota</h3>
      <div class="topbar">
        <div class="box">
          <label>Selecionar XML</label>
          <input type="file" id="xmlFileInput" accept=".xml,text/xml,application/xml">
        </div>
      </div>
      <div class="acoes-topo">
        <button class="btn-blue" onclick="uploadXmlNota()">📤 Anexar XML</button>
      </div>
      <div id="msgXml" class="msg"></div>
      <div id="listaXmls" class="lista-xml"></div>
    </div>

    <div class="grid-produtos" id="containerProdutos"></div>

    <div class="box nao-imprimir">
      <h3 style="margin-top:0;">📂 Cotações salvas</h3>
      <div class="lista-salvos" id="listaCotacoesSalvas"></div>
    </div>

    <div class="box hidden nao-imprimir" id="painelRelatorio">
      <h3 style="margin-top:0;">📄 Relatório de aprovados</h3>
      <div id="conteudoRelatorioAprovados"></div>
    </div>

    <div class="box hidden nao-imprimir" id="painelUsuarios">
      <h3 style="margin-top:0;">👥 Cadastro de usuários</h3>

      <div class="topbar">
        <div class="box">
          <label>Usuário</label>
          <input type="text" id="novoUsuario" placeholder="login do usuário">
        </div>

        <div class="box">
          <label>Senha</label>
          <input type="text" id="novaSenha" placeholder="senha">
        </div>

        <div class="box">
          <label>Nome</label>
          <input type="text" id="novoNome" placeholder="nome completo">
        </div>

        <div class="box">
          <label>Perfil</label>
          <select id="novoPerfil">
            <option value="usuario">Usuário</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
      </div>

      <div class="acoes-topo">
        <button class="btn-blue" onclick="salvarUsuario()">💾 Salvar Usuário</button>
        <button class="btn" onclick="limparFormularioUsuario()">🧹 Limpar</button>
      </div>

      <div id="msgUsuarios" class="msg"></div>
      <div class="lista-salvos" id="listaUsuarios"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xzxcxalmarshffueylxw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Q1EXGzQ7WjCXwdgLjyGhFQ_pTu5QFYX";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const FORNECEDORES = 6;
    let proximoProdutoId = 1;
    let usuarioSessao = null;
    let cotacaoAtual = null;

    function parseNumeroBR(valor){
      if(valor === null || valor === undefined) return 0;
      let v = String(valor).trim();
      if(!v) return 0;
      v = v.replace(/\./g, "");
      v = v.replace(",", ".");
      const n = parseFloat(v);
      return isNaN(n) ? 0 : n;
    }

    function formatarMoedaBR(valor){
      const n = Number(valor || 0);
      return n.toLocaleString("pt-BR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatarDataBR(dataISO){
      if(!dataISO) return "-";
      const p = dataISO.split("-");
      if(p.length !== 3) return dataISO;
      return `${p[2]}/${p[1]}/${p[0]}`;
    }

    function formatarDataHoraBR(dataISO){
      if(!dataISO) return "-";
      return new Date(dataISO).toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" });
    }

    function dataAtualISO(){
      const hoje = new Date();
      const ano = hoje.getFullYear();
      const mes = String(hoje.getMonth()+1).padStart(2,"0");
      const dia = String(hoje.getDate()).padStart(2,"0");
      return `${ano}-${mes}-${dia}`;
    }

    function escapeHtml(texto){
      return String(texto ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function limparNumeroWhatsapp(numero){
      return String(numero || "").replace(/\D/g, "");
    }

    function mostrarMsgLogin(texto, cor = "red"){
      const el = document.getElementById("msgLogin");
      el.innerText = texto;
      el.style.color = cor;
    }

    function mostrarStatusSalvo(msg){
      const el = document.getElementById("statusSalvar");
      el.innerText = "🟢 " + msg;
      el.style.background = "#14532d";
      setTimeout(() => {
        el.innerText = "🟢 Salvo";
        el.style.background = "#374151";
      }, 2000);
    }

    function marcarNaoSalvo(){
      const el = document.getElementById("statusSalvar");
      el.innerText = "🟡 Alterações não salvas";
      el.style.background = "#92400e";
    }

    function mostrarMsgXml(texto, cor = "#b7f7c8"){
      const el = document.getElementById("msgXml");
      el.innerText = texto;
      el.style.color = cor;
    }

    async function fazerLogin(){
      const usuario = document.getElementById("loginUsuario").value.trim().toLowerCase();
      const senha = document.getElementById("loginSenha").value.trim();

      if(!usuario || !senha){
        mostrarMsgLogin("Informe usuário e senha.");
        return;
      }

      const { data, error } = await client
        .from("usuarios_cotacao")
        .select("*")
        .eq("usuario", usuario)
        .eq("senha", senha)
        .limit(1);

      if(error){
        mostrarMsgLogin("Erro ao consultar usuário: " + error.message);
        return;
      }

      if(!data || !data.length){
        mostrarMsgLogin("Usuário ou senha inválidos.");
        return;
      }

      usuarioSessao = data[0];

      if(usuarioSessao.ativo === false){
        mostrarMsgLogin("Usuário inativo. Procure o administrador.");
        return;
      }

      document.getElementById("telaLogin").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");

      document.getElementById("usuarioLogadoInfo").innerText = usuarioSessao.nome;
      document.getElementById("perfilLogadoInfo").innerText = usuarioSessao.perfil;
      document.getElementById("compradorNome").value = usuarioSessao.nome;

      if(usuarioSessao.perfil === "admin"){
        document.getElementById("btnAprovarCotacao").classList.remove("hidden");
        document.getElementById("btnRelatorioAprovados").classList.remove("hidden");
        document.getElementById("btnUsuarios").classList.remove("hidden");
        document.getElementById("boxFiltroComprador").classList.remove("hidden");
        await carregarCompradoresParaAdmin();
        await carregarUsuarios();
      }

      document.getElementById("dataReferencia").value = dataAtualISO();
      await carregarDadosDaData();
      await atualizarListaCotacoesSalvas();
      ativarEventosGlobais();
    }

    function logout(){
      location.reload();
    }

    function atualizarDashboard(){
      let total = 0;
      let qtdProdutos = document.querySelectorAll("#containerProdutos .card").length;
      let qtdAprovados = 0;

      document.querySelectorAll("#containerProdutos tr.aprovado").forEach(r => {
        const partes = r.id.split("_");
        const produtoId = partes[1];
        const fornecedorId = partes[2];
        total += parseNumeroBR(document.getElementById(`total_${produtoId}_${fornecedorId}`).innerText || 0);
        qtdAprovados++;
      });

      document.getElementById("dashData").innerText = formatarDataBR(document.getElementById("dataReferencia").value);
      document.getElementById("dashProdutos").innerText = qtdProdutos;
      document.getElementById("dashAprovados").innerText = qtdAprovados;
      document.getElementById("dashTotal").innerText = formatarMoedaBR(total);

      const status = cotacaoAtual?.status_aprovacao || "PENDENTE";
      document.getElementById("dashStatus").innerText = status;

      const chip = document.getElementById("chipStatusCotacao");
      chip.innerText = status;
      chip.className = "chip " + (status === "APROVADA" ? "chip-aprovada" : "chip-pendente");

      document.getElementById("infoAprovacao").innerText =
        cotacaoAtual?.aprovado_por
          ? `${cotacaoAtual.aprovado_por} em ${formatarDataHoraBR(cotacaoAtual.aprovado_em)}`
          : "-";
    }

    function atualizarListaFornecedoresLote(){
      const select = document.getElementById("fornecedorLote");
      const atual = select.value;
      const fornecedores = new Set();

      document.querySelectorAll('input[list="listaFornecedores"]').forEach(inp => {
        const valor = (inp.value || "").trim().toUpperCase();
        if(valor) fornecedores.add(valor);
      });

      select.innerHTML = `<option value="">Selecione o fornecedor</option>`;
      [...fornecedores].sort().forEach(nome => {
        const op = document.createElement("option");
        op.value = nome;
        op.textContent = nome;
        select.appendChild(op);
      });

      if([...fornecedores].includes(atual)) select.value = atual;
    }

    function destacarMenor(produtoId){
      let valores = [];
      for(let i=1; i<=FORNECEDORES; i++){
        const v = parseNumeroBR(document.getElementById(`total_${produtoId}_${i}`).innerText || 0);
        if(v > 0) valores.push(v);
      }

      const menor = valores.length ? Math.min(...valores) : 0;

      for(let i=1; i<=FORNECEDORES; i++){
        const row = document.getElementById(`row_${produtoId}_${i}`);
        if(!row) continue;
        row.classList.remove("menor");
        const v = parseNumeroBR(document.getElementById(`total_${produtoId}_${i}`).innerText || 0);
        if(menor > 0 && v === menor){
          row.classList.add("menor");
        }
      }
    }

    function calcular(produtoId, fornecedorId, salvar = true){
      const kg = parseNumeroBR(document.getElementById(`kg_${produtoId}`).value || 0);
      const vu = parseNumeroBR(document.getElementById(`vu_${produtoId}_${fornecedorId}`).value || 0);
      const total = kg * vu;

      document.getElementById(`total_${produtoId}_${fornecedorId}`).innerText = formatarMoedaBR(total);

      destacarMenor(produtoId);
      atualizarListaFornecedoresLote();
      atualizarDashboard();
      if (salvar) salvarAutomatico();
    }

    function recalcular(produtoId){
      for(let f=1; f<=FORNECEDORES; f++){
        calcular(produtoId, f, false);
      }
      salvarAutomatico();
    }

    function toggleAprovacao(produtoId, fornecedorId){
      if(usuarioSessao?.perfil !== "admin"){
        const chk = document.getElementById(`ok_${produtoId}_${fornecedorId}`);
        chk.checked = !chk.checked;
        alert("Somente o administrador pode aprovar.");
        return;
      }

      const row = document.getElementById(`row_${produtoId}_${fornecedorId}`);
      const chk = document.getElementById(`ok_${produtoId}_${fornecedorId}`);

      if(row && chk){
        if(chk.checked) row.classList.add("aprovado");
        else row.classList.remove("aprovado");
      }

      atualizarDashboard();
      salvarAutomatico();
    }

    function alterarNotaRecebida(produtoId, fornecedorId){
      if(usuarioSessao?.perfil !== "admin"){
        const sel = document.getElementById(`nota_${produtoId}_${fornecedorId}`);
        if(sel) sel.value = "";
        alert("Somente o administrador pode informar se recebeu a nota.");
        return;
      }

      salvarAutomatico();
    }

    function aprovarFornecedorEmLote(){
      if(usuarioSessao?.perfil !== "admin"){
        alert("Somente o administrador pode aprovar em lote.");
        return;
      }

      const fornecedor = document.getElementById("fornecedorLote").value;
      if(!fornecedor){
        alert("Selecione um fornecedor.");
        return;
      }

      let aprovados = 0;

      document.querySelectorAll("#containerProdutos .card").forEach(card => {
        const produtoId = card.id.replace("card_","");
        for(let f=1; f<=FORNECEDORES; f++){
          const forn = (document.getElementById(`forn_${produtoId}_${f}`)?.value || "").trim().toUpperCase();
          const valor = parseNumeroBR(document.getElementById(`vu_${produtoId}_${f}`)?.value || 0);
          const chk = document.getElementById(`ok_${produtoId}_${f}`);
          const row = document.getElementById(`row_${produtoId}_${f}`);

          if(forn === fornecedor.trim().toUpperCase() && valor > 0){
            if(chk) chk.checked = true;
            if(row) row.classList.add("aprovado");
            aprovados++;
          }
        }
      });

      atualizarDashboard();
      salvarAutomatico();
      alert(`Fornecedor aprovado em ${aprovados} item(ns).`);
    }

    function adicionarProduto(dados = null){
      const produtoId = dados?.produtoId || proximoProdutoId++;
      if(produtoId >= proximoProdutoId) proximoProdutoId = produtoId + 1;

      const card = document.createElement("div");
      card.className = "card";
      card.id = `card_${produtoId}`;

      let htmlFornecedores = "";
      for(let f=1; f<=FORNECEDORES; f++){
        const fornVal = dados?.fornecedores?.[f-1]?.nome || "";
        const vuVal = dados?.fornecedores?.[f-1]?.valor || "";
        const classVal = dados?.fornecedores?.[f-1]?.classificacao || "";
        const notaVal = dados?.fornecedores?.[f-1]?.notaRecebida || "";
        const aprovado = dados?.fornecedores?.[f-1]?.aprovado || false;

        htmlFornecedores += `
          <tr id="row_${produtoId}_${f}" class="${aprovado ? "aprovado" : ""}">
            <td><input list="listaFornecedores" id="forn_${produtoId}_${f}" value="${escapeHtml(fornVal)}"></td>
            <td><input type="text" id="vu_${produtoId}_${f}" value="${escapeHtml(vuVal)}" oninput="calcular(${produtoId},${f})"></td>
            <td id="total_${produtoId}_${f}" class="valor-total">0,00</td>
            <td>
              <select id="class_${produtoId}_${f}">
                <option value="">Classificação</option>
                <option value="PRIMEIRA" ${classVal === "PRIMEIRA" ? "selected" : ""}>Primeira</option>
                <option value="SEGUNDA" ${classVal === "SEGUNDA" ? "selected" : ""}>Segunda</option>
                <option value="TERCEIRA" ${classVal === "TERCEIRA" ? "selected" : ""}>Terceira</option>
              </select>
            </td>
            <td>
              <select id="nota_${produtoId}_${f}" onchange="alterarNotaRecebida(${produtoId},${f})">
                <option value="" ${notaVal === "" ? "selected" : ""}>-</option>
                <option value="SIM" ${notaVal === "SIM" ? "selected" : ""}>SIM</option>
                <option value="NAO" ${notaVal === "NAO" ? "selected" : ""}>NÃO</option>
              </select>
            </td>
            <td><input class="ok-check" type="checkbox" id="ok_${produtoId}_${f}" ${aprovado ? "checked" : ""} onchange="toggleAprovacao(${produtoId},${f})"></td>
          </tr>`;
      }

      card.innerHTML = `
        <h3>
          <span>Produto</span>
          <button class="btn-red" type="button" onclick="removerProduto(${produtoId})">🗑️</button>
        </h3>

        <div class="topo-produto">
          <input type="text" placeholder="Nome do produto" id="prod_${produtoId}" value="${escapeHtml(dados?.nome || "")}">
          <input type="text" placeholder="KG" id="kg_${produtoId}" value="${escapeHtml(dados?.kg || "")}" oninput="recalcular(${produtoId})">
        </div>

        <div class="table-wrap">
          <table>
            <tr>
              <th>Fornecedor</th>
              <th>V.Unit</th>
              <th>Total</th>
              <th>Classificação</th>
              <th>Nota Recebida</th>
              <th>OK</th>
            </tr>
            ${htmlFornecedores}
          </table>
        </div>
      `;

      document.getElementById("containerProdutos").appendChild(card);

      for(let f=1; f<=FORNECEDORES; f++){
        calcular(produtoId, f, false);
      }

      ativarEventosInputs(card);
      atualizarListaFornecedoresLote();
      atualizarDashboard();
    }

    function removerProduto(produtoId){
      if(usuarioSessao?.perfil !== "admin" && cotacaoAtual?.status_aprovacao === "APROVADA"){
        alert("Cotação aprovada não pode ser alterada pelo usuário.");
        return;
      }

      if(!confirm("Deseja remover este produto?")) return;
      const card = document.getElementById(`card_${produtoId}`);
      if(card) card.remove();
      atualizarListaFornecedoresLote();
      atualizarDashboard();
      salvarAutomatico();
    }

    function montarDadosTela(){
      const produtos = [];

      document.querySelectorAll("#containerProdutos .card").forEach(card => {
        const produtoId = parseInt(card.id.replace("card_",""), 10);
        const nome = document.getElementById(`prod_${produtoId}`)?.value || "";
        const kg = document.getElementById(`kg_${produtoId}`)?.value || "";

        let fornecedores = [];

        for(let f=1; f<=FORNECEDORES; f++){
          fornecedores.push({
            nome: document.getElementById(`forn_${produtoId}_${f}`)?.value || "",
            valor: document.getElementById(`vu_${produtoId}_${f}`)?.value || "",
            classificacao: document.getElementById(`class_${produtoId}_${f}`)?.value || "",
            notaRecebida: document.getElementById(`nota_${produtoId}_${f}`)?.value || "",
            aprovado: document.getElementById(`ok_${produtoId}_${f}`)?.checked || false
          });
        }

        produtos.push({ produtoId, nome, kg, fornecedores });
      });

      return {
        dataReferencia: document.getElementById("dataReferencia").value || "",
        compradorNome: document.getElementById("compradorNome").value || "",
        compradorWhatsapp: document.getElementById("compradorWhatsapp").value || "",
        responsavel: document.getElementById("responsavel").value || "",
        observacao: document.getElementById("observacao").value || "",
        fornecedorLote: document.getElementById("fornecedorLote").value || "",
        produtos
      };
    }

    async function salvarNaNuvem(){
      const data = document.getElementById("dataReferencia").value;
      if (!data) return false;

      const payload = montarDadosTela();

      const compradorUsuario = usuarioSessao.perfil === "admin"
        ? (document.getElementById("filtroComprador").value || usuarioSessao.usuario)
        : usuarioSessao.usuario;

      const compradorNome = usuarioSessao.perfil === "admin"
        ? (document.getElementById("compradorNome").value || usuarioSessao.nome)
        : usuarioSessao.nome;

      const registro = {
        data_referencia: data,
        comprador_usuario: compradorUsuario,
        comprador_nome: compradorNome,
        comprador_whatsapp: payload.compradorWhatsapp || "",
        responsavel: payload.responsavel || "",
        observacao: payload.observacao || "",
        status_aprovacao: cotacaoAtual?.status_aprovacao || "PENDENTE",
        aprovado_por: cotacaoAtual?.aprovado_por || null,
        aprovado_em: cotacaoAtual?.aprovado_em || null,
        dados: payload
      };

      const { data: upsertData, error } = await client
        .from("cotacoes_bsm")
        .upsert(registro, { onConflict: "data_referencia,comprador_usuario" })
        .select()
        .maybeSingle();

      if (error) {
        console.error(error);
        alert("Erro ao salvar na nuvem: " + error.message);
        return false;
      }

      cotacaoAtual = upsertData || cotacaoAtual;
      return true;
    }

    async function carregarDaNuvemPorData(data, compradorUsuario){
      let query = client
        .from("cotacoes_bsm")
        .select("*")
        .eq("data_referencia", data);

      if(usuarioSessao.perfil === "admin"){
        if(compradorUsuario){
          query = query.eq("comprador_usuario", compradorUsuario);
        }
      } else {
        query = query.eq("comprador_usuario", usuarioSessao.usuario);
      }

      const { data: registros, error } = await query.order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        return null;
      }

      if(!registros || !registros.length) return null;
      return registros[0];
    }

    async function excluirDaNuvemPorData(data, compradorUsuario){
      let query = client
        .from("cotacoes_bsm")
        .delete()
        .eq("data_referencia", data);

      if(usuarioSessao.perfil === "admin"){
        if(compradorUsuario) query = query.eq("comprador_usuario", compradorUsuario);
      } else {
        query = query.eq("comprador_usuario", usuarioSessao.usuario);
      }

      const { error } = await query;

      if (error) {
        console.error(error);
        alert("Erro ao excluir: " + error.message);
        return false;
      }
      return true;
    }

    async function listarCotacoesSalvas(){
      let query = client
        .from("cotacoes_bsm")
        .select("*")
        .order("data_referencia", { ascending: false });

      if(usuarioSessao.perfil !== "admin"){
        query = query.eq("comprador_usuario", usuarioSessao.usuario);
      }

      const { data, error } = await query;

      if(error){
        console.error(error);
        return [];
      }
      return data || [];
    }

    async function salvarAutomatico(manual = false){
      const ok = await salvarNaNuvem();
      if (ok) {
        await atualizarListaCotacoesSalvas();
        if (cotacaoAtual?.id) {
          await carregarXmlsDaCotacao();
        }
        mostrarStatusSalvo(manual ? "Salvo com sucesso" : "Salvo automático");
      }
    }

    async function salvarManual(){
      marcarNaoSalvo();
      await salvarAutomatico(true);
    }

    function limparTela(){
      document.getElementById("containerProdutos").innerHTML = "";
      document.getElementById("listaXmls").innerHTML = "";
      document.getElementById("msgXml").innerText = "";
      proximoProdutoId = 1;
      atualizarDashboard();
    }

    async function carregarDadosDaData(){
      limparTela();
      cotacaoAtual = null;

      const data = document.getElementById("dataReferencia").value;
      if(!data) return;

      const compradorUsuario = usuarioSessao.perfil === "admin"
        ? document.getElementById("filtroComprador").value
        : usuarioSessao.usuario;

      const registro = await carregarDaNuvemPorData(data, compradorUsuario);

      if(!registro){
        document.getElementById("responsavel").value = "";
        document.getElementById("observacao").value = "";
        document.getElementById("compradorWhatsapp").value = "";
        if(usuarioSessao.perfil !== "admin"){
          document.getElementById("compradorNome").value = usuarioSessao.nome;
        }
        adicionarProduto();
        atualizarDashboard();
        mostrarStatusSalvo("Nova cotação carregada");
        return;
      }

      cotacaoAtual = registro;
      const dados = registro.dados || {};

      document.getElementById("compradorNome").value = registro.comprador_nome || usuarioSessao.nome || "";
      document.getElementById("responsavel").value = registro.responsavel || "";
      document.getElementById("observacao").value = registro.observacao || "";
      document.getElementById("compradorWhatsapp").value =
        registro.comprador_whatsapp || dados.compradorWhatsapp || "";

      if(dados.produtos && dados.produtos.length){
        dados.produtos.forEach(prod => adicionarProduto(prod));
      } else {
        adicionarProduto();
      }

      atualizarListaFornecedoresLote();
      if(dados.fornecedorLote){
        document.getElementById("fornecedorLote").value = dados.fornecedorLote;
      }

      if(registro.status_aprovacao === "APROVADA"){
        document.querySelectorAll("#containerProdutos .card").forEach(c => c.classList.add("aprovada-geral"));
      }

      await carregarXmlsDaCotacao();
      atualizarDashboard();
      mostrarStatusSalvo("Cotação carregada");
    }

    async function limparDadosDaData(){
      const data = document.getElementById("dataReferencia").value;
      if(!data){
        alert("Selecione uma data.");
        return;
      }

      const compradorUsuario = usuarioSessao.perfil === "admin"
        ? document.getElementById("filtroComprador").value
        : usuarioSessao.usuario;

      if(confirm(`Deseja apagar a cotação da data ${formatarDataBR(data)}?`)){
        const ok = await excluirDaNuvemPorData(data, compradorUsuario);
        if (!ok) return;
        await carregarDadosDaData();
        await atualizarListaCotacoesSalvas();
      }
    }

    async function excluirCotacao(data, compradorUsuario){
      if(!confirm(`Deseja excluir a cotação de ${formatarDataBR(data)}?`)) return;
      const ok = await excluirDaNuvemPorData(data, compradorUsuario);
      if (!ok) return;
      await carregarDadosDaData();
      await atualizarListaCotacoesSalvas();
    }

    async function abrirCotacao(data, compradorUsuario, compradorNome){
      document.getElementById("dataReferencia").value = data;
      if(usuarioSessao.perfil === "admin"){
        document.getElementById("filtroComprador").value = compradorUsuario;
        document.getElementById("compradorNome").value = compradorNome || "";
      }
      await carregarDadosDaData();
      atualizarDashboard();
    }

    async function atualizarListaCotacoesSalvas(){
      const alvo = document.getElementById("listaCotacoesSalvas");
      alvo.innerHTML = "";

      const registros = await listarCotacoesSalvas();

      if(!registros.length){
        alvo.innerHTML = `<div class="salvo">Nenhuma cotação salva ainda.</div>`;
        return;
      }

      registros.forEach(registro => {
        const dados = registro.dados || {};
        const produtos = dados.produtos || [];

        let total = 0;
        produtos.forEach(prod => {
          (prod.fornecedores || []).forEach(forn => {
            if(forn.aprovado){
              const kg = parseNumeroBR(prod.kg || 0);
              const vu = parseNumeroBR(forn.valor || 0);
              total += (kg * vu);
            }
          });
        });

        const statusClass = registro.status_aprovacao === "APROVADA" ? "chip-aprovada" : "chip-pendente";

        const div = document.createElement("div");
        div.className = "salvo";
        div.innerHTML = `
          <strong>${formatarDataBR(registro.data_referencia)}</strong>
          <div>Comprador: ${escapeHtml(registro.comprador_nome || "-")}</div>
          <div>Produtos: ${produtos.length}</div>
          <div>Total aprovado: R$ ${formatarMoedaBR(total)}</div>
          <div class="chip ${statusClass}" style="margin-bottom:8px;">${registro.status_aprovacao || "PENDENTE"}</div>
          <button class="btn-blue" onclick="abrirCotacao('${registro.data_referencia}','${registro.comprador_usuario}','${escapeHtml(registro.comprador_nome || "")}')">Abrir</button>
          ${usuarioSessao.perfil === "admin" ? `<button class="btn-red" onclick="excluirCotacao('${registro.data_referencia}','${registro.comprador_usuario}')">Excluir</button>` : ""}
        `;
        alvo.appendChild(div);
      });
    }

    async function aprovarCotacaoAdmin(){
      if(usuarioSessao?.perfil !== "admin"){
        alert("Somente o administrador pode aprovar.");
        return;
      }

      const data = document.getElementById("dataReferencia").value;
      const compradorUsuario = document.getElementById("filtroComprador").value;

      if(!data || !compradorUsuario){
        alert("Selecione data e comprador.");
        return;
      }

      const payload = montarDadosTela();

      const { data: registro, error } = await client
        .from("cotacoes_bsm")
        .upsert({
          data_referencia: data,
          comprador_usuario: compradorUsuario,
          comprador_nome: document.getElementById("compradorNome").value || "",
          comprador_whatsapp: document.getElementById("compradorWhatsapp").value || "",
          responsavel: payload.responsavel || "",
          observacao: payload.observacao || "",
          status_aprovacao: "APROVADA",
          aprovado_por: usuarioSessao.nome,
          aprovado_em: new Date().toISOString(),
          dados: payload
        }, { onConflict: "data_referencia,comprador_usuario" })
        .select()
        .maybeSingle();

      if(error){
        alert("Erro ao aprovar: " + error.message);
        return;
      }

      cotacaoAtual = registro;

      document.querySelectorAll("#containerProdutos tr.aprovado").forEach(r => {
        r.classList.add("aprovado");
      });

      atualizarDashboard();
      await atualizarListaCotacoesSalvas();
      mostrarStatusSalvo("Cotação aprovada");
      alert("Cotação aprovada com sucesso.");
    }

        .select("*")
        .eq("perfil", "usuario")
        .eq("ativo", true)

    async function carregarCotacaoDoCompradorAdmin(){
      const usuario = document.getElementById("filtroComprador").value;
      if(!usuario) return;

      const { data } = await client
        .from("usuarios_cotacao")
        .select("*")
        .eq("usuario", usuario)

    async function abrirRelatorioAprovados(){
      const painel = document.getElementById("painelRelatorio");
      const alvo = document.getElementById("conteudoRelatorioAprovados");

      painel.classList.remove("hidden");
      alvo.innerHTML = "Carregando relatório...";

      let query = client
        .from("cotacoes_bsm")
        .select("*")
        .eq("status_aprovacao", "APROVADA")
        .order("data_referencia", { ascending: false });

      if(usuarioSessao.perfil !== "admin"){
        query = query.eq("comprador_usuario", usuarioSessao.usuario);
      }

      const { data, error } = await query;

      if(error){
        alvo.innerHTML = `<div style="color:#ffb4b4;font-weight:bold;">Erro ao carregar relatório: ${error.message}</div>`;
        return;
      }

      if(!data || !data.length){
        alvo.innerHTML = `<div>Nenhuma cotação aprovada encontrada.</div>`;
        return;
      }

      let html = "";

      data.forEach(reg => {
        const produtos = reg.dados?.produtos || [];
        let totalGeral = 0;
        let linhas = "";

        produtos.forEach(prod => {
          (prod.fornecedores || []).forEach(f => {
            if(f.aprovado){
              const kg = parseNumeroBR(prod.kg || 0);
              const vu = parseNumeroBR(f.valor || 0);
              const total = kg * vu;
              totalGeral += total;

              linhas += `
                <tr>
                  <td>${escapeHtml(prod.nome || "")}</td>
                  <td>${formatarMoedaBR(kg)}</td>
                  <td>${escapeHtml(f.nome || "")}</td>
                  <td>${escapeHtml(f.classificacao || "")}</td>
                  <td>${escapeHtml(f.notaRecebida || "-")}</td>
                  <td>${formatarMoedaBR(vu)}</td>
                  <td>${formatarMoedaBR(total)}</td>
                </tr>
              `;
            }
          });
        });

        if(!linhas){
          linhas = `<tr><td colspan="7">Nenhum fornecedor aprovado nesta cotação.</td></tr>`;
        }

        html += `
          <div class="card" style="margin-bottom:12px;">
            <strong>Data:</strong> ${formatarDataBR(reg.data_referencia)}<br>
            <strong>Comprador:</strong> ${escapeHtml(reg.comprador_nome || "-")}<br>
            <strong>Aprovado por:</strong> ${escapeHtml(reg.aprovado_por || "-")}<br>
            <strong>Data aprovação:</strong> ${formatarDataHoraBR(reg.aprovado_em)}<br><br>

            <div class="table-wrap">
              <table>
                <tr>
                  <th>Produto</th>
                  <th>KG</th>
                  <th>Fornecedor Aprovado</th>
                  <th>Classificação</th>
                  <th>Nota Recebida</th>
                  <th>Valor Unitário</th>
                  <th>Total</th>
                </tr>
                ${linhas}
                <tr>
                  <td colspan="6" style="text-align:right;"><strong>Total Geral Aprovado</strong></td>
                  <td><strong>${formatarMoedaBR(totalGeral)}</strong></td>
                </tr>
              </table>
            </div>

            <div style="margin-top:10px;">
              <button class="btn-green" onclick="enviarRelatorioAprovadoWhatsApp('${reg.id}')">📲 Enviar para WhatsApp</button>
            </div>
          </div>
        `;
      });

      alvo.innerHTML = html;
    }

    async function enviarRelatorioAprovadoWhatsApp(cotacaoId){
      const { data: reg, error } = await client
        .from("cotacoes_bsm")
        .select("*")
        .eq("id", cotacaoId)
        .maybeSingle();

      if(error || !reg){
        alert("Não foi possível carregar a cotação para envio.");
        return;
      }

      const produtos = reg.dados?.produtos || [];

      let texto = `*RELATÓRIO DE APROVADOS - BSM*%0A`;
      texto += `Data: ${formatarDataBR(reg.data_referencia)}%0A`;
      texto += `Comprador: ${encodeURIComponent(reg.comprador_nome || "-")}%0A`;
      texto += `Aprovado por: ${encodeURIComponent(reg.aprovado_por || "-")}%0A`;
      texto += `Aprovado em: ${encodeURIComponent(formatarDataHoraBR(reg.aprovado_em))}%0A%0A`;

      let totalGeral = 0;

      produtos.forEach(prod => {
        (prod.fornecedores || []).forEach(f => {
          if(f.aprovado){
            const kg = parseNumeroBR(prod.kg || 0);
            const vu = parseNumeroBR(f.valor || 0);
            const total = kg * vu;
            totalGeral += total;

            texto += `Produto: ${encodeURIComponent(prod.nome || "")}%0A`;
            texto += `Fornecedor: ${encodeURIComponent(f.nome || "")}%0A`;
            texto += `Classificação: ${encodeURIComponent(f.classificacao || "")}%0A`;
            texto += `Nota Recebida: ${encodeURIComponent(f.notaRecebida || "-")}%0A`;
            texto += `KG: ${encodeURIComponent(formatarMoedaBR(kg))}%0A`;
            texto += `Valor Unitário: R$ ${encodeURIComponent(formatarMoedaBR(vu))}%0A`;
            texto += `Total: R$ ${encodeURIComponent(formatarMoedaBR(total))}%0A%0A`;
          }
        });
      });

      texto += `*TOTAL GERAL: R$ ${encodeURIComponent(formatarMoedaBR(totalGeral))}*`;

      window.open("https://web.whatsapp.com/send?text=" + texto, "_blank");
    }

    async function uploadXmlNota(){
      try{
        const fileInput = document.getElementById("xmlFileInput");
        const file = fileInput.files[0];

        if(!file){
          mostrarMsgXml("Selecione um arquivo XML.", "#ffd6a5");
          return;
        }

        const nome = file.name.toLowerCase();
        if(!nome.endsWith(".xml")){
          mostrarMsgXml("Escolha um arquivo .xml", "#ffd6a5");
          return;
        }

        if(!cotacaoAtual?.id){
          const ok = await salvarNaNuvem();
          if(!ok || !cotacaoAtual?.id){
            mostrarMsgXml("Salve a cotação antes de anexar o XML.", "#ffb4b4");
            return;
          }
        }

        const conteudoXml = await file.text();

        const { error } = await client
          .from("cotacoes_xml")
          .insert({
            cotacao_id: cotacaoAtual.id,
            nome_arquivo: file.name,
            conteudo_xml: conteudoXml,
            uploaded_by: usuarioSessao?.nome || ""
          });

        if(error){
          mostrarMsgXml("Erro ao anexar XML: " + error.message, "#ffb4b4");
          return;
        }

        fileInput.value = "";
        mostrarMsgXml("XML anexado com sucesso.");
        await carregarXmlsDaCotacao();
      }catch(e){
        mostrarMsgXml("Erro ao ler o XML.", "#ffb4b4");
      }
    }

    async function carregarXmlsDaCotacao(){
      const alvo = document.getElementById("listaXmls");
      alvo.innerHTML = "";

      if(!cotacaoAtual?.id){
        alvo.innerHTML = `<div class="xml-item">Nenhum XML vinculado ainda.</div>`;
        return;
      }

      const { data, error } = await client
        .from("cotacoes_xml")
        .select("*")
        .eq("cotacao_id", cotacaoAtual.id)
        .order("uploaded_at", { ascending: false });

      if(error){
        alvo.innerHTML = `<div class="xml-item">Erro ao carregar XMLs: ${error.message}</div>`;
        return;
      }

      if(!data || !data.length){
        alvo.innerHTML = `<div class="xml-item">Nenhum XML anexado ainda.</div>`;
        return;
      }

      data.forEach(xml => {
        const div = document.createElement("div");
        div.className = "xml-item";
        div.innerHTML = `
          <strong>${escapeHtml(xml.nome_arquivo || "")}</strong>
          <div>Enviado por: ${escapeHtml(xml.uploaded_by || "-")}</div>
          <div>Data: ${formatarDataHoraBR(xml.uploaded_at)}</div>
          <div style="margin-top:10px;">
            <button class="btn-blue" onclick="baixarXml(${xml.id})">⬇️ Baixar</button>
            <button class="btn-red" onclick="excluirXml(${xml.id})">🗑️ Excluir</button>
          </div>
        `;
        alvo.appendChild(div);
      });
    }

    async function baixarXml(xmlId){
      const { data, error } = await client
        .from("cotacoes_xml")
        .select("*")
        .eq("id", xmlId)
        .maybeSingle();

      if(error || !data){
        alert("Não foi possível baixar o XML.");
        return;
      }

      const blob = new Blob([data.conteudo_xml || ""], { type: "application/xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = data.nome_arquivo || "nota.xml";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function excluirXml(xmlId){
      if(!confirm("Deseja excluir este XML?")) return;

      const { error } = await client
        .from("cotacoes_xml")
        .delete()
        .eq("id", xmlId);

      if(error){
        alert("Erro ao excluir XML: " + error.message);
        return;
      }

      mostrarMsgXml("XML excluído com sucesso.");
      await carregarXmlsDaCotacao();
    }

    function togglePainelUsuarios(){
      const painel = document.getElementById("painelUsuarios");
      painel.classList.toggle("hidden");
      if(!painel.classList.contains("hidden")){
        carregarUsuarios();
      }
    }

    function limparFormularioUsuario(){
      document.getElementById("novoUsuario").value = "";
      document.getElementById("novaSenha").value = "";
      document.getElementById("novoNome").value = "";
      document.getElementById("novoPerfil").value = "usuario";
      document.getElementById("msgUsuarios").innerText = "";
    }

    async function salvarUsuario(){
      if(usuarioSessao?.perfil !== "admin"){
        alert("Somente o administrador pode cadastrar usuários.");
        return;
      }

      const usuario = document.getElementById("novoUsuario").value.trim().toLowerCase();
      const senha = document.getElementById("novaSenha").value.trim();
      const nome = document.getElementById("novoNome").value.trim();
      const perfil = document.getElementById("novoPerfil").value;

      if(!usuario || !senha || !nome){
        document.getElementById("msgUsuarios").innerText = "Preencha usuário, senha e nome.";
        document.getElementById("msgUsuarios").style.color = "#ffd6a5";
        return;
      }

      const { error } = await client
        .from("usuarios_cotacao")
        .upsert({
          usuario,
          senha,
          nome,
          perfil,
          ativo: true
        }, { onConflict: "usuario" });

      if(error){
        document.getElementById("msgUsuarios").innerText = "Erro ao salvar usuário: " + error.message;
        document.getElementById("msgUsuarios").style.color = "#ffb4b4";
        return;
      }

      document.getElementById("msgUsuarios").innerText = "Usuário salvo com sucesso.";
      document.getElementById("msgUsuarios").style.color = "#b7f7c8";

      limparFormularioUsuario();
      await carregarUsuarios();
      await carregarCompradoresParaAdmin();
    }

    async function carregarUsuarios(){
      if(usuarioSessao?.perfil !== "admin") return;

      const alvo = document.getElementById("listaUsuarios");
      alvo.innerHTML = "Carregando...";

      const { data, error } = await client
        .from("usuarios_cotacao")
        .select("*")
        .order("nome", { ascending: true });

      if(error){
        alvo.innerHTML = `<div class="salvo">Erro ao carregar usuários: ${error.message}</div>`;
        return;
      }

      if(!data || !data.length){
        alvo.innerHTML = `<div class="salvo">Nenhum usuário cadastrado.</div>`;
        return;
      }

      alvo.innerHTML = "";

      data.forEach(u => {
        const div = document.createElement("div");
        div.className = "salvo";
        div.innerHTML = `
          <strong>${escapeHtml(u.nome || "")}</strong>
          <div>Usuário: ${escapeHtml(u.usuario || "")}</div>
          <div>Perfil: ${escapeHtml(u.perfil || "")}</div>
          <div>Status: ${u.ativo === false ? "Inativo" : "Ativo"}</div>
          <div style="margin-top:10px;">
            <button class="btn-blue" onclick="editarUsuario('${escapeHtml(u.usuario)}', '${escapeHtml(u.nome)}', '${escapeHtml(u.senha)}', '${escapeHtml(u.perfil)}')">Editar</button>
            <button class="btn-red" onclick="toggleUsuarioAtivo('${escapeHtml(u.usuario)}', ${u.ativo === false ? 'true' : 'false'})">
              ${u.ativo === false ? 'Ativar' : 'Desativar'}
            </button>
          </div>
        `;
        alvo.appendChild(div);
      });
    }

    function editarUsuario(usuario, nome, senha, perfil){
      document.getElementById("novoUsuario").value = usuario;
      document.getElementById("novoNome").value = nome;
      document.getElementById("novaSenha").value = senha;
      document.getElementById("novoPerfil").value = perfil || "usuario";
      document.getElementById("painelUsuarios").classList.remove("hidden");
      window.scrollTo({
        top: document.getElementById("painelUsuarios").offsetTop - 20,
        behavior: "smooth"
      });
    }

    async function toggleUsuarioAtivo(usuario, ativar){
      if(usuarioSessao?.perfil !== "admin"){
        alert("Somente o administrador pode alterar usuários.");
        return;
      }

      const { error } = await client
        .from("usuarios_cotacao")
        .update({ ativo: ativar })
        .eq("usuario", usuario);

      if(error){
        alert("Erro ao alterar usuário: " + error.message);
        return;
      }

      await carregarUsuarios();
      await carregarCompradoresParaAdmin();
    }

    function ativarEventosInputs(container){
      container.querySelectorAll('input[list="listaFornecedores"]').forEach(inp => {
        inp.addEventListener("blur", () => {
          inp.value = (inp.value || "").trim().toUpperCase();
          atualizarListaFornecedoresLote();
          marcarNaoSalvo();
          salvarAutomatico();
        });
      });

      container.querySelectorAll("input[type='text'], select").forEach(inp => {
        inp.addEventListener("input", () => {
          marcarNaoSalvo();
          salvarAutomatico();
        });
        inp.addEventListener("change", () => {
          marcarNaoSalvo();
          salvarAutomatico();
        });
      });
    }

    function ativarEventosGlobais(){
      document.getElementById("dataReferencia").addEventListener("change", async () => {
        marcarNaoSalvo();
        await carregarDadosDaData();
      });

      document.getElementById("responsavel").addEventListener("input", () => {
        marcarNaoSalvo();
        salvarAutomatico();
      });

      document.getElementById("observacao").addEventListener("input", () => {
        marcarNaoSalvo();
        salvarAutomatico();
      });

      document.getElementById("compradorWhatsapp").addEventListener("input", () => {
        marcarNaoSalvo();
        salvarAutomatico();
      });

      document.getElementById("fornecedorLote").addEventListener("change", marcarNaoSalvo);
    }

    document.getElementById("dataReferencia").value = dataAtualISO();
  </script>
