<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSM COTAÇÃO - APROVAÇÃO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f2b4a;
      color: #fff;
    }
    .topo {
      background: #0c223a;
      padding: 18px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .container {
      max-width: 1550px;
      margin: 0 auto;
      padding: 16px;
    }
    .hidden { display: none !important; }

    .card {
      background: #173a63;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,.18);
    }

    .login-wrap {
      max-width: 430px;
      margin: 40px auto;
    }

    .topbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .box {
      background: #173a63;
      border-radius: 14px;
      padding: 14px;
    }

    .box label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 4px;
    }

    textarea { min-height: 80px; resize: vertical; }

    .acoes-topo {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn { background: #111827; color: #fff; }
    .btn-green { background: #15803d; color: #fff; }
    .btn-blue { background: #1d4ed8; color: #fff; }
    .btn-red { background: #b91c1c; color: #fff; }
    .btn-yellow { background: #b45309; color: #fff; }
    .btn-gray { background: #374151; color: #fff; }

    .status-save {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      background: #374151;
      font-weight: bold;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .dash {
      background: #173a63;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }

    .dash strong {
      display: block;
      font-size: 26px;
      margin-top: 6px;
    }

    .grid-produtos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
      gap: 16px;
    }

    .topo-produto {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 10px;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 8px;
      text-align: center;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    th { background: rgba(0,0,0,0.18); }

    .aprovado td {
      background: rgba(46,204,113,0.18);
      color: #7CFFAE;
      font-weight: bold;
    }

    .menor td {
      outline: 2px solid #f1c40f;
      outline-offset: -2px;
    }

    .ok-check {
      width: 20px !important;
      height: 20px;
      cursor: pointer;
    }

    .linha-acoes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .lista-salvos {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
    }

    .salvo {
      background: #173a63;
      border-radius: 12px;
      padding: 12px;
    }

    .salvo strong {
      display: block;
      margin-bottom: 8px;
    }

    .msg {
      margin-top: 10px;
      font-weight: bold;
    }

    .aprovada-geral {
      border: 2px solid #22c55e;
      box-shadow: 0 0 0 2px rgba(34,197,94,.18);
    }

    .chip {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 8px;
    }

    .chip-pendente {
      background: #fef3c7;
      color: #92400e;
    }

    .chip-aprovada {
      background: #dcfce7;
      color: #166534;
    }

    .valor-total {
      min-width: 90px;
      display: inline-block;
    }

    @media (max-width: 900px) {
      .topo-produto { grid-template-columns: 1fr; }
      .grid-produtos { grid-template-columns: 1fr; }
    }

    @media print {
      .acoes-topo, .lista-salvos, .nao-imprimir { display: none !important; }
      body { background: white; color: black; }
      .card, .box, .dash { background: white; color: black; border: 1px solid #ccc; box-shadow: none; }
      .topo { background: white; color: black; border-bottom: 1px solid #ccc; }
    }
  </style>
</head>
<body>
  <div class="topo">BSM SISTEMA DE COTAÇÃO DE PREÇOS - APROVAÇÃO</div>

  <div id="telaLogin" class="container">
    <div class="card login-wrap">
      <h2>Login do sistema</h2>
      <label>Usuário</label>
      <input type="text" id="loginUsuario" placeholder="Usuário" />
      <label>Senha</label>
      <input type="password" id="loginSenha" placeholder="Senha" />
      <button class="btn-blue" onclick="fazerLogin()">Entrar</button>
      <div class="msg" id="msgLogin"></div>
    </div>
  </div>

  <div id="app" class="container hidden">
    <div class="acoes-topo">
      <button class="btn-gray" onclick="logout()">Sair</button>
      <button class="btn-blue" onclick="adicionarProduto()">➕ Adicionar Produto</button>
      <button class="btn-green" onclick="salvarManual()">💾 Salvar (OK)</button>
      <button class="btn-yellow" onclick="aprovarFornecedorEmLote()">✅ Aprovar Lote</button>
      <button class="btn" onclick="carregarDadosDaData()">🔄 Recarregar Data</button>
      <button class="btn-red" onclick="limparDadosDaData()">🗑️ Limpar Data</button>
      <button class="btn" onclick="window.print()">🖨️ Imprimir</button>
      <button class="btn-green hidden" id="btnAprovarCotacao" onclick="aprovarCotacaoAdmin()">✅ Aprovar Cotação</button>
      <button class="btn-gray hidden" id="btnRelatorioAprovados" onclick="abrirRelatorioAprovados()">📄 Relatório Aprovados</button>
      <span id="statusSalvar" class="status-save">🟢 Salvo</span>
    </div>

    <div class="topbar">
      <div class="box">
        <label>Data</label>
        <input type="date" id="dataReferencia">
      </div>
      <div class="box">
        <label>Comprador</label>
        <input type="text" id="compradorNome" readonly>
      </div>
      <div class="box">
        <label>Responsável interno</label>
        <input type="text" id="responsavel" placeholder="Responsável">
      </div>
      <div class="box">
        <label>Observação</label>
        <input type="text" id="observacao" placeholder="Observação da cotação">
      </div>
      <div class="box">
        <label>Aprovar fornecedor em lote</label>
        <select id="fornecedorLote">
          <option value="">Selecione o fornecedor</option>
        </select>
      </div>
      <div class="box hidden" id="boxFiltroComprador">
        <label>Filtrar comprador</label>
        <select id="filtroComprador" onchange="carregarCotacaoDoCompradorAdmin()">
          <option value="">Selecione</option>
        </select>
      </div>
    </div>

    <div class="dashboard">
      <div class="dash">Data<strong id="dashData">-</strong></div>
      <div class="dash">Produtos<strong id="dashProdutos">0</strong></div>
      <div class="dash">Aprovados<strong id="dashAprovados">0</strong></div>
      <div class="dash">Total aprovado<strong id="dashTotal">0,00</strong></div>
      <div class="dash">Status<strong id="dashStatus">PENDENTE</strong></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div><strong>Usuário logado:</strong> <span id="usuarioLogadoInfo">-</span></div>
      <div><strong>Perfil:</strong> <span id="perfilLogadoInfo">-</span></div>
      <div><strong>Última aprovação:</strong> <span id="infoAprovacao">-</span></div>
      <div id="chipStatusCotacao" class="chip chip-pendente">PENDENTE</div>
    </div>

    <div class="grid-produtos" id="containerProdutos"></div>

    <div class="box nao-imprimir" style="margin-top:16px;">
      <h3 style="margin-top:0;">📂 Cotações salvas</h3>
      <div class="lista-salvos" id="listaCotacoesSalvas"></div>
    </div>

    <div class="box hidden" id="painelRelatorio" style="margin-top:16px;">
      <h3 style="margin-top:0;">📄 Relatório de aprovados</h3>
      <div id="conteudoRelatorioAprovados"></div>
    </div>
  </div>

  <datalist id="listaFornecedores">
    <option value="3 B COMERCIAL LTDA">
    <option value="A K QUALITY SERVICE COMERCIO, REPRE TRANSP LTDA">
    <option value="ABATEDOURO DORENSE LTDA">
    <option value="ADRIANO EUGENIO">
    <option value="AGRO ALIMENTOS FERREIRA LTDA">
    <option value="ALIMENTAR FOODS FRIGORIFICO LTDA">
    <option value="ALIMENTOS ESMERALDA IND E COM LTDA">
    <option value="ATACADAO S.A">
    <option value="AVIVAR ALIMENTOS LTDA">
    <option value="AVIVAR ALIMENTOS S/A">
    <option value="BH FOODS COMERCIO E INDUSTRIA LTDA">
    <option value="BRF S.A.">
    <option value="CENTER FRIOS COMERCIO E INDUSTRIA LTDA">
    <option value="CERRADO COMERCIO E DISTRIBUICAO DE CARNES LTDA">
    <option value="COMERCIAL FRAGA LTDA">
    <option value="DMA DISTRIBUIDORA S/A">
    <option value="FRANGOGEL DISTRIBUIDORA DE ALIMENTOS LTDA">

    <option value="FRIGOLIX COMERCIO DE ALIMENTOS LTDA">

    <option value="GVA ALIMENTOS COMERCIO DE CARNES LTDA">
    <option value="IMPERIUM ALIMENTOS LTDA">
    <option value="MART MINAS DISTRIBUICAO LTDA">
    <option value="MINEIRAO ATACADISTA LTDA">
    <option value="PLENA ALIMENTOS LTDA">
    <option value="QS DISTRIBUICAO E COMERCIO DE CARNES LTDA">
    <option value="SEARA COMERCIO DE ALIMENTOS LTDA">
    <option value="SUPERMERCADOS BH COMERCIO DE ALIMENTOS S/A">
    <option value="SUPREMO CARNES LTDA">
    <option value="VENTURA ALIMENTOS DO BRASIL LTDA">
    <option value="WL DISTRIBUIDORA">
  </datalist>

  <script>
    const SUPABASE_URL = "https://xzxcxalmarshffueylxw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Q1EXGzQ7WjCXwdgLjyGhFQ_pTu5QFYX";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const FORNECEDORES = 6;
    let proximoProdutoId = 1;
    let usuarioSessao = null;
    let cotacaoAtual = null;

    function parseNumeroBR(valor){
      if(valor === null || valor === undefined) return 0;
      let v = String(valor).trim();
      if(!v) return 0;
      v = v.replace(/\./g, "");
      v = v.replace(",", ".");
      const n = parseFloat(v);
      return isNaN(n) ? 0 : n;
    }

    function formatarMoedaBR(valor){
      const n = Number(valor || 0);
      return n.toLocaleString("pt-BR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatarDataBR(dataISO){
      if(!dataISO) return "-";
      const p = dataISO.split("-");
      if(p.length !== 3) return dataISO;
      return `${p[2]}/${p[1]}/${p[0]}`;
    }

    function formatarDataHoraBR(dataISO){
      if(!dataISO) return "-";
      return new Date(dataISO).toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" });
    }

    function dataAtualISO(){
      const hoje = new Date();
      const ano = hoje.getFullYear();
      const mes = String(hoje.getMonth()+1).padStart(2,"0");
      const dia = String(hoje.getDate()).padStart(2,"0");
      return `${ano}-${mes}-${dia}`;
    }

    function escapeHtml(texto){
      return String(texto ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function mostrarMsgLogin(texto, cor = "red"){
      const el = document.getElementById("msgLogin");
      el.innerText = texto;
      el.style.color = cor;
    }

    async function fazerLogin(){
      const usuario = document.getElementById("loginUsuario").value.trim();
      const senha = document.getElementById("loginSenha").value.trim();

      if(!usuario || !senha){
        mostrarMsgLogin("Informe usuário e senha.");
        return;
      }

      const { data, error } = await client
        .from("usuarios_cotacao")
        .select("*")
        .eq("usuario", usuario)
        .eq("senha", senha)
        .limit(1);

      if(error){
        mostrarMsgLogin("Erro ao consultar usuário: " + error.message);
        return;
      }

      if(!data || !data.length){
        mostrarMsgLogin("Usuário ou senha inválidos.");
        return;
      }

      usuarioSessao = data[0];

      document.getElementById("telaLogin").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");

      document.getElementById("usuarioLogadoInfo").innerText = usuarioSessao.nome;
      document.getElementById("perfilLogadoInfo").innerText = usuarioSessao.perfil;
      document.getElementById("compradorNome").value = usuarioSessao.nome;

      if(usuarioSessao.perfil === "admin"){
        document.getElementById("btnAprovarCotacao").classList.remove("hidden");
        document.getElementById("btnRelatorioAprovados").classList.remove("hidden");
        document.getElementById("boxFiltroComprador").classList.remove("hidden");
        await carregarCompradoresParaAdmin();
      }

      document.getElementById("dataReferencia").value = dataAtualISO();
      await carregarDadosDaData();
      await atualizarListaCotacoesSalvas();
      ativarEventosGlobais();
    }

    function logout(){
      location.reload();
    }

    function mostrarStatusSalvo(msg){
      const el = document.getElementById("statusSalvar");
      el.innerText = "🟢 " + msg;
      el.style.background = "#14532d";
      setTimeout(() => {
        el.innerText = "🟢 Salvo";
        el.style.background = "#374151";
      }, 2000);
    }

    function marcarNaoSalvo(){
      const el = document.getElementById("statusSalvar");
      el.innerText = "🟡 Alterações não salvas";
      el.style.background = "#92400e";
    }

    function atualizarDashboard(){
      let total = 0;
      let qtdProdutos = document.querySelectorAll("#containerProdutos .card").length;
      let qtdAprovados = 0;

      document.querySelectorAll("#containerProdutos tr.aprovado").forEach(r => {
        const partes = r.id.split("_");
        const produtoId = partes[1];
        const fornecedorId = partes[2];
        total += parseNumeroBR(document.getElementById(`total_${produtoId}_${fornecedorId}`).innerText || 0);
        qtdAprovados++;
      });

      document.getElementById("dashData").innerText = formatarDataBR(document.getElementById("dataReferencia").value);
      document.getElementById("dashProdutos").innerText = qtdProdutos;
      document.getElementById("dashAprovados").innerText = qtdAprovados;
      document.getElementById("dashTotal").innerText = formatarMoedaBR(total);

      const status = cotacaoAtual?.status_aprovacao || "PENDENTE";
      document.getElementById("dashStatus").innerText = status;

      const chip = document.getElementById("chipStatusCotacao");
      chip.innerText = status;
      chip.className = "chip " + (status === "APROVADA" ? "chip-aprovada" : "chip-pendente");

      document.getElementById("infoAprovacao").innerText =
        cotacaoAtual?.aprovado_por
          ? `${cotacaoAtual.aprovado_por} em ${formatarDataHoraBR(cotacaoAtual.aprovado_em)}`
          : "-";
    }

    function atualizarListaFornecedoresLote(){
      const select = document.getElementById("fornecedorLote");
      const atual = select.value;
      const fornecedores = new Set();

      document.querySelectorAll('input[list="listaFornecedores"]').forEach(inp => {
        const valor = (inp.value || "").trim().toUpperCase();
        if(valor) fornecedores.add(valor);
      });

      select.innerHTML = `<option value="">Selecione o fornecedor</option>`;
      [...fornecedores].sort().forEach(nome => {
        const op = document.createElement("option");
        op.value = nome;
        op.textContent = nome;
        select.appendChild(op);
      });

      if([...fornecedores].includes(atual)) select.value = atual;
    }

    function destacarMenor(produtoId){
      let valores = [];

      for(let i=1; i<=FORNECEDORES; i++){
        const v = parseNumeroBR(document.getElementById(`total_${produtoId}_${i}`).innerText || 0);
        if(v > 0) valores.push(v);
      }

      const menor = valores.length ? Math.min(...valores) : 0;

      for(let i=1; i<=FORNECEDORES; i++){
        const row = document.getElementById(`row_${produtoId}_${i}`);
        if(!row) continue;

        row.classList.remove("menor");
        const v = parseNumeroBR(document.getElementById(`total_${produtoId}_${i}`).innerText || 0);

        if(menor > 0 && v === menor){
          row.classList.add("menor");
        }
      }
    }

    function calcular(produtoId, fornecedorId, salvar = true){
      const kg = parseNumeroBR(document.getElementById(`kg_${produtoId}`).value || 0);
      const vu = parseNumeroBR(document.getElementById(`vu_${produtoId}_${fornecedorId}`).value || 0);
      const total = kg * vu;

      document.getElementById(`total_${produtoId}_${fornecedorId}`).innerText = formatarMoedaBR(total);

      destacarMenor(produtoId);
      atualizarListaFornecedoresLote();
      atualizarDashboard();
      if (salvar) salvarAutomatico();
    }

    function recalcular(produtoId){
      for(let f=1; f<=FORNECEDORES; f++){
        calcular(produtoId, f, false);
      }
      salvarAutomatico();
    }

    function toggleAprovacao(produtoId, fornecedorId){
      if(usuarioSessao?.perfil !== "admin"){
        const chk = document.getElementById(`ok_${produtoId}_${fornecedorId}`);
        chk.checked = !chk.checked;
        alert("Somente o administrador pode aprovar.");
        return;
      }

      const row = document.getElementById(`row_${produtoId}_${fornecedorId}`);
      const chk = document.getElementById(`ok_${produtoId}_${fornecedorId}`);

      if(row && chk){
        if(chk.checked) row.classList.add("aprovado");
        else row.classList.remove("aprovado");
      }

      atualizarDashboard();
      salvarAutomatico();
    }

    function aprovarFornecedorEmLote(){
      if(usuarioSessao?.perfil !== "admin"){
        alert("Somente o administrador pode aprovar em lote.");
        return;
      }

      const fornecedor = document.getElementById("fornecedorLote").value;
      if(!fornecedor){
        alert("Selecione um fornecedor.");
        return;
      }

      let aprovados = 0;

      document.querySelectorAll("#containerProdutos .card").forEach(card => {
        const produtoId = card.id.replace("card_","");
        for(let f=1; f<=FORNECEDORES; f++){
          const forn = (document.getElementById(`forn_${produtoId}_${f}`)?.value || "").trim().toUpperCase();
          const valor = parseNumeroBR(document.getElementById(`vu_${produtoId}_${f}`)?.value || 0);
          const chk = document.getElementById(`ok_${produtoId}_${f}`);
          const row = document.getElementById(`row_${produtoId}_${f}`);

          if(forn === fornecedor.trim().toUpperCase() && valor > 0){
            if(chk) chk.checked = true;
            if(row) row.classList.add("aprovado");
            aprovados++;
          }
        }
      });

      atualizarDashboard();
      salvarAutomatico();
      alert(`Fornecedor aprovado em ${aprovados} item(ns).`);
    }

    function adicionarProduto(dados = null){
      const produtoId = dados?.produtoId || proximoProdutoId++;
      if(produtoId >= proximoProdutoId) proximoProdutoId = produtoId + 1;

      const card = document.createElement("div");
      card.className = "card";
      card.id = `card_${produtoId}`;

      let htmlFornecedores = "";
      for(let f=1; f<=FORNECEDORES; f++){
        const fornVal = dados?.fornecedores?.[f-1]?.nome || "";
        const vuVal = dados?.fornecedores?.[f-1]?.valor || "";
        const classVal = dados?.fornecedores?.[f-1]?.classificacao || "";
        const aprovado = dados?.fornecedores?.[f-1]?.aprovado || false;

        htmlFornecedores += `
          <tr id="row_${produtoId}_${f}" class="${aprovado ? "aprovado" : ""}">
            <td><input list="listaFornecedores" id="forn_${produtoId}_${f}" value="${escapeHtml(fornVal)}"></td>
            <td><input type="text" id="vu_${produtoId}_${f}" value="${escapeHtml(vuVal)}" oninput="calcular(${produtoId},${f})"></td>
            <td id="total_${produtoId}_${f}" class="valor-total">0,00</td>
            <td>
              <select id="class_${produtoId}_${f}">
                <option value="">Classificação</option>
                <option value="PRIMEIRA" ${classVal === "PRIMEIRA" ? "selected" : ""}>Primeira</option>
                <option value="SEGUNDA" ${classVal === "SEGUNDA" ? "selected" : ""}>Segunda</option>
                <option value="TERCEIRA" ${classVal === "TERCEIRA" ? "selected" : ""}>Terceira</option>
              </select>
            </td>
            <td><input class="ok-check" type="checkbox" id="ok_${produtoId}_${f}" ${aprovado ? "checked" : ""} onchange="toggleAprovacao(${produtoId},${f})"></td>
          </tr>`;
      }

      card.innerHTML = `
        <h3>
          Produto
          <button class="btn-red" type="button" onclick="removerProduto(${produtoId})">🗑️</button>
        </h3>

        <div class="topo-produto">
          <input type="text" placeholder="Nome do produto" id="prod_${produtoId}" value="${escapeHtml(dados?.nome || "")}">
          <input type="text" placeholder="KG" id="kg_${produtoId}" value="${escapeHtml(dados?.kg || "")}" oninput="recalcular(${produtoId})">
        </div>

        <table>
          <tr>
            <th>Fornecedor</th>
            <th>V.Unit</th>
            <th>Total</th>
            <th>Classificação</th>
            <th>OK</th>
          </tr>
          ${htmlFornecedores}
        </table>
      `;

      document.getElementById("containerProdutos").appendChild(card);

      for(let f=1; f<=FORNECEDORES; f++){
        calcular(produtoId, f, false);
      }

      ativarEventosInputs(card);
      atualizarListaFornecedoresLote();
      atualizarDashboard();
    }

    function removerProduto(produtoId){
      if(usuarioSessao?.perfil !== "admin" && cotacaoAtual?.status_aprovacao === "APROVADA"){
        alert("Cotação aprovada não pode ser alterada pelo usuário.");
        return;
      }

      if(!confirm("Deseja remover este produto?")) return;
      const card = document.getElementById(`card_${produtoId}`);
      if(card) card.remove();
      atualizarListaFornecedoresLote();
      atualizarDashboard();
      salvarAutomatico();
    }

    function ativarEventosInputs(container){
      container.querySelectorAll('input[list="listaFornecedores"]').forEach(inp => {
        inp.addEventListener("blur", () => {
          inp.value = (inp.value || "").trim().toUpperCase();
          atualizarListaFornecedoresLote();
          marcarNaoSalvo();
          salvarAutomatico();
        });
      });

      container.querySelectorAll("input[type='text'], select").forEach(inp => {
        inp.addEventListener("input", () => {
          marcarNaoSalvo();
          salvarAutomatico();
        });
        inp.addEventListener("change", () => {
          marcarNaoSalvo();
          salvarAutomatico();
        });
      });
    }

    function montarDadosTela(){
      const produtos = [];

      document.querySelectorAll("#containerProdutos .card").forEach(card => {
        const produtoId = parseInt(card.id.replace("card_",""), 10);
        const nome = document.getElementById(`prod_${produtoId}`)?.value || "";
        const kg = document.getElementById(`kg_${produtoId}`)?.value || "";

        let fornecedores = [];

        for(let f=1; f<=FORNECEDORES; f++){
          fornecedores.push({
            nome: document.getElementById(`forn_${produtoId}_${f}`)?.value || "",
            valor: document.getElementById(`vu_${produtoId}_${f}`)?.value || "",
            classificacao: document.getElementById(`class_${produtoId}_${f}`)?.value || "",
            aprovado: document.getElementById(`ok_${produtoId}_${f}`)?.checked || false
          });
        }

        produtos.push({ produtoId, nome, kg, fornecedores });
      });

      return {
        dataReferencia: document.getElementById("dataReferencia").value || "",
        compradorNome: document.getElementById("compradorNome").value || "",
        responsavel: document.getElementById("responsavel").value || "",
        observacao: document.getElementById("observacao").value || "",
        fornecedorLote: document.getElementById("fornecedorLote").value || "",
        produtos
      };
    }

    async function salvarNaNuvem(){
      const data = document.getElementById("dataReferencia").value;
      if (!data) return false;

      const payload = montarDadosTela();

      const compradorUsuario = usuarioSessao.perfil === "admin"
        ? (document.getElementById("filtroComprador").value || usuarioSessao.usuario)
        : usuarioSessao.usuario;

      const compradorNome = usuarioSessao.perfil === "admin"
        ? (document.getElementById("compradorNome").value || usuarioSessao.nome)
        : usuarioSessao.nome;

      const registro = {
        data_referencia: data,
        comprador_usuario: compradorUsuario,
        comprador_nome: compradorNome,
        responsavel: payload.responsavel || "",
        observacao: payload.observacao || "",
        status_aprovacao: cotacaoAtual?.status_aprovacao || "PENDENTE",
        aprovado_por: cotacaoAtual?.aprovado_por || null,
        aprovado_em: cotacaoAtual?.aprovado_em || null,
        dados: payload
      };

      const { data: upsertData, error } = await client
        .from("cotacoes_bsm")
        .upsert(registro, { onConflict: "data_referencia,comprador_usuario" })
        .select()
        .maybeSingle();

      if (error) {
        console.error(error);
        alert("Erro ao salvar na nuvem: " + error.message);
        return false;
      }

      cotacaoAtual = upsertData || cotacaoAtual;
      return true;
    }

    async function carregarDaNuvemPorData(data, compradorUsuario){
      let query = client
        .from("cotacoes_bsm")
        .select("*")
        .eq("data_referencia", data);

      if(usuarioSessao.perfil === "admin"){
        if(compradorUsuario){
          query = query.eq("comprador_usuario", compradorUsuario);
        }
      } else {
        query = query.eq("comprador_usuario", usuarioSessao.usuario);
      }

      const { data: registros, error } = await query.order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        return null;
      }

      if(!registros || !registros.length) return null;
      return registros[0];
    }

    async function excluirDaNuvemPorData(data, compradorUsuario){
      let query = client
        .from("cotacoes_bsm")
        .delete()
        .eq("data_referencia", data);

      if(usuarioSessao.perfil === "admin"){
        if(compradorUsuario) query = query.eq("comprador_usuario", compradorUsuario);
      } else {
        query = query.eq("comprador_usuario", usuarioSessao.usuario);
      }

      const { error } = await query;

      if (error) {
        console.error(error);
        alert("Erro ao excluir: " + error.message);
        return false;
      }
      return true;
    }

    async function listarCotacoesSalvas(){
      let query = client
        .from("cotacoes_bsm")
        .select("*")
        .order("data_referencia", { ascending: false });

      if(usuarioSessao.perfil !== "admin"){
        query = query.eq("comprador_usuario", usuarioSessao.usuario);
      }

      const { data, error } = await query;

      if(error){
        console.error(error);
        return [];
      }
      return data || [];
    }

    async function salvarAutomatico(manual = false){
      const ok = await salvarNaNuvem();
      if (ok) {
        await atualizarListaCotacoesSalvas();
        mostrarStatusSalvo(manual ? "Salvo com sucesso" : "Salvo automático");
      }
    }

    async function salvarManual(){
      marcarNaoSalvo();
      await salvarAutomatico(true);
    }

    function limparTela(){
      document.getElementById("containerProdutos").innerHTML = "";
      proximoProdutoId = 1;
      atualizarDashboard();
    }

    async function carregarDadosDaData(){
      limparTela();
      cotacaoAtual = null;

      const data = document.getElementById("dataReferencia").value;
      if(!data) return;

      const compradorUsuario = usuarioSessao.perfil === "admin"
        ? document.getElementById("filtroComprador").value
        : usuarioSessao.usuario;

      const registro = await carregarDaNuvemPorData(data, compradorUsuario);

      if(!registro){
        document.getElementById("responsavel").value = "";
        document.getElementById("observacao").value = "";
        if(usuarioSessao.perfil !== "admin"){
          document.getElementById("compradorNome").value = usuarioSessao.nome;
        }
        adicionarProduto();
        atualizarDashboard();
        mostrarStatusSalvo("Nova cotação carregada");
        return;
      }

      cotacaoAtual = registro;
      const dados = registro.dados || {};

      document.getElementById("compradorNome").value = registro.comprador_nome || usuarioSessao.nome || "";
      document.getElementById("responsavel").value = registro.responsavel || "";
      document.getElementById("observacao").value = registro.observacao || "";

      if(dados.produtos && dados.produtos.length){
        dados.produtos.forEach(prod => adicionarProduto(prod));
      } else {
        adicionarProduto();
      }

      atualizarListaFornecedoresLote();
      if(dados.fornecedorLote){
        document.getElementById("fornecedorLote").value = dados.fornecedorLote;
      }

      if(registro.status_aprovacao === "APROVADA"){
        document.querySelectorAll("#containerProdutos .card").forEach(c => c.classList.add("aprovada-geral"));
      }

      atualizarDashboard();
      mostrarStatusSalvo("Cotação carregada");
    }

    async function limparDadosDaData(){
      const data = document.getElementById("dataReferencia").value;
      if(!data){
        alert("Selecione uma data.");
        return;
      }

      const compradorUsuario = usuarioSessao.perfil === "admin"
        ? document.getElementById("filtroComprador").value
        : usuarioSessao.usuario;

      if(confirm(`Deseja apagar a cotação da data ${formatarDataBR(data)}?`)){
        const ok = await excluirDaNuvemPorData(data, compradorUsuario);
        if (!ok) return;
        await carregarDadosDaData();
        await atualizarListaCotacoesSalvas();
      }
    }

    async function excluirCotacao(data, compradorUsuario){
      if(!confirm(`Deseja excluir a cotação de ${formatarDataBR(data)}?`)) return;
      const ok = await excluirDaNuvemPorData(data, compradorUsuario);
      if (!ok) return;
      await atualizarListaCotacoesSalvas();
      await carregarDadosDaData();
    }

    async function abrirCotacao(data, compradorUsuario, compradorNome){
      document.getElementById("dataReferencia").value = data;
      if(usuarioSessao.perfil === "admin"){
        document.getElementById("filtroComprador").value = compradorUsuario;
        document.getElementById("compradorNome").value = compradorNome || "";
      }
      await carregarDadosDaData();
      atualizarDashboard();
    }

    async function atualizarListaCotacoesSalvas(){
      const alvo = document.getElementById("listaCotacoesSalvas");
      alvo.innerHTML = "";

      const registros = await listarCotacoesSalvas();

      if(!registros.length){
        alvo.innerHTML = `<div class="salvo">Nenhuma cotação salva ainda.</div>`;
        return;
      }

      registros.forEach(registro => {
        const dados = registro.dados || {};
        const produtos = dados.produtos || [];

        let total = 0;
        produtos.forEach(prod => {
          (prod.fornecedores || []).forEach(forn => {
            if(forn.aprovado){
              const kg = parseNumeroBR(prod.kg || 0);
              const vu = parseNumeroBR(forn.valor || 0);
              total += (kg * vu);
            }
          });
        });

        const statusClass = registro.status_aprovacao === "APROVADA" ? "chip-aprovada" : "chip-pendente";

        const div = document.createElement("div");
        div.className = "salvo";
        div.innerHTML = `
          <strong>${formatarDataBR(registro.data_referencia)}</strong>
          <div>Comprador: ${escapeHtml(registro.comprador_nome || "-")}</div>
          <div>Produtos: ${produtos.length}</div>
          <div>Total aprovado: R$ ${formatarMoedaBR(total)}</div>
          <div class="chip ${statusClass}" style="margin-bottom:8px;">${registro.status_aprovacao || "PENDENTE"}</div>
          <button class="btn-blue" onclick="abrirCotacao('${registro.data_referencia}','${registro.comprador_usuario}','${escapeHtml(registro.comprador_nome || "")}')">Abrir</button>
          ${usuarioSessao.perfil === "admin" ? `<button class="btn-red" onclick="excluirCotacao('${registro.data_referencia}','${registro.comprador_usuario}')">Excluir</button>` : ""}
        `;
        alvo.appendChild(div);
      });
    }

    async function aprovarCotacaoAdmin(){
      if(usuarioSessao?.perfil !== "admin"){
        alert("Somente o administrador pode aprovar.");
        return;
      }

      const data = document.getElementById("dataReferencia").value;
      const compradorUsuario = document.getElementById("filtroComprador").value;

      if(!data || !compradorUsuario){
        alert("Selecione data e comprador.");
        return;
      }

      const payload = montarDadosTela();

      const { data: registro, error } = await client
        .from("cotacoes_bsm")
        .upsert({
          data_referencia: data,
          comprador_usuario: compradorUsuario,
          comprador_nome: document.getElementById("compradorNome").value || "",
          responsavel: payload.responsavel || "",
          observacao: payload.observacao || "",
          status_aprovacao: "APROVADA",
          aprovado_por: usuarioSessao.nome,
          aprovado_em: new Date().toISOString(),
          dados: payload
        }, { onConflict: "data_referencia,comprador_usuario" })
        .select()
        .maybeSingle();

      if(error){
        alert("Erro ao aprovar: " + error.message);
        return;
      }

      cotacaoAtual = registro;

      document.querySelectorAll("#containerProdutos .card").forEach(c => c.classList.add("aprovada-geral"));

      atualizarDashboard();
      await atualizarListaCotacoesSalvas();
      mostrarStatusSalvo("Cotação aprovada");
      alert("Cotação aprovada com sucesso.");
    }

    async function carregarCompradoresParaAdmin(){
      const { data, error } = await client
        .from("usuarios_cotacao")
        .select("*")
        .eq("perfil", "usuario")
        .order("nome", { ascending: true });

      if(error) return;

      const select = document.getElementById("filtroComprador");
      select.innerHTML = `<option value="">Selecione</option>`;

      (data || []).forEach(u => {
        const op = document.createElement("option");
        op.value = u.usuario;
        op.textContent = u.nome;
        select.appendChild(op);
      });

      if(data && data.length){
        select.value = data[0].usuario;
        document.getElementById("compradorNome").value = data[0].nome;
      }
    }

    async function carregarCotacaoDoCompradorAdmin(){
      const usuario = document.getElementById("filtroComprador").value;
      if(!usuario) return;

      const { data } = await client
        .from("usuarios_cotacao")
        .select("*")
        .eq("usuario", usuario)
        .maybeSingle();

      document.getElementById("compradorNome").value = data?.nome || "";
      await carregarDadosDaData();
    }

    async function abrirRelatorioAprovados(){
      const painel = document.getElementById("painelRelatorio");
      const alvo = document.getElementById("conteudoRelatorioAprovados");

      painel.classList.remove("hidden");
      alvo.innerHTML = "Carregando...";

      let query = client
        .from("cotacoes_bsm")
        .select("*")
        .eq("status_aprovacao", "APROVADA")
        .order("data_referencia", { ascending: false });

      if(usuarioSessao.perfil !== "admin"){
        query = query.eq("comprador_usuario", usuarioSessao.usuario);
      }

      const { data, error } = await query;

      if(error){
        alvo.innerHTML = "Erro ao carregar relatório: " + error.message;
        return;
      }

      if(!data || !data.length){
        alvo.innerHTML = "Nenhuma cotação aprovada encontrada.";
        return;
      }

      let html = "";

      data.forEach(reg => {
        const produtos = reg.dados?.produtos || [];
        let totalGeral = 0;

        html += `
          <div class="card" style="margin-bottom:12px;">
            <strong>Data:</strong> ${formatarDataBR(reg.data_referencia)}<br>
            <strong>Comprador:</strong> ${escapeHtml(reg.comprador_nome || "-")}<br>
            <strong>Aprovado por:</strong> ${escapeHtml(reg.aprovado_por || "-")}<br>
            <strong>Data aprovação:</strong> ${formatarDataHoraBR(reg.aprovado_em)}<br><br>

            <table>
              <tr>
                <th>Produto</th>
                <th>KG</th>
                <th>Fornecedor Aprovado</th>
                <th>Classificação</th>
                <th>Valor Unitário</th>
                <th>Total</th>
              </tr>
        `;

        produtos.forEach(prod => {
          (prod.fornecedores || []).forEach(f => {
            if(f.aprovado){
              const kg = parseNumeroBR(prod.kg || 0);
              const vu = parseNumeroBR(f.valor || 0);
              const total = kg * vu;
              totalGeral += total;

              html += `
                <tr>
                  <td>${escapeHtml(prod.nome || "")}</td>
                  <td>${formatarMoedaBR(kg)}</td>
                  <td>${escapeHtml(f.nome || "")}</td>
                  <td>${escapeHtml(f.classificacao || "")}</td>
                  <td>${formatarMoedaBR(vu)}</td>
                  <td>${formatarMoedaBR(total)}</td>
                </tr>
              `;
            }
          });
        });

        html += `
              <tr>
                <td colspan="5" style="text-align:right;"><strong>Total Geral Aprovado</strong></td>
                <td><strong>${formatarMoedaBR(totalGeral)}</strong></td>
              </tr>
            </table>

            <div style="margin-top:10px;">
              <button class="btn-green" onclick="enviarRelatorioAprovadoWhatsApp('${reg.id}')">📲 Enviar para WhatsApp</button>
            </div>
          </div>
        `;
      });

      alvo.innerHTML = html;
    }

    async function enviarRelatorioAprovadoWhatsApp(cotacaoId){
      const { data: reg, error } = await client
        .from("cotacoes_bsm")
        .select("*")
        .eq("id", cotacaoId)
        .maybeSingle();

      if(error || !reg){
        alert("Não foi possível carregar a cotação para envio.");
        return;
      }

      const produtos = reg.dados?.produtos || [];

      let texto = `*RELATÓRIO DE APROVADOS - BSM*%0A`;
      texto += `Data: ${formatarDataBR(reg.data_referencia)}%0A`;
      texto += `Comprador: ${encodeURIComponent(reg.comprador_nome || "-")}%0A`;
      texto += `Aprovado por: ${encodeURIComponent(reg.aprovado_por || "-")}%0A`;
      texto += `Aprovado em: ${encodeURIComponent(formatarDataHoraBR(reg.aprovado_em))}%0A%0A`;

      let totalGeral = 0;

      produtos.forEach(prod => {
        (prod.fornecedores || []).forEach(f => {
          if(f.aprovado){
            const kg = parseNumeroBR(prod.kg || 0);
            const vu = parseNumeroBR(f.valor || 0);
            const total = kg * vu;
            totalGeral += total;

            texto += `Produto: ${encodeURIComponent(prod.nome || "")}%0A`;
            texto += `Fornecedor: ${encodeURIComponent(f.nome || "")}%0A`;
            texto += `Classificação: ${encodeURIComponent(f.classificacao || "")}%0A`;
            texto += `KG: ${encodeURIComponent(formatarMoedaBR(kg))}%0A`;
            texto += `Valor Unitário: R$ ${encodeURIComponent(formatarMoedaBR(vu))}%0A`;
            texto += `Total: R$ ${encodeURIComponent(formatarMoedaBR(total))}%0A%0A`;
          }
        });
      });

      texto += `*TOTAL GERAL: R$ ${encodeURIComponent(formatarMoedaBR(totalGeral))}*`;

      window.open("https://web.whatsapp.com/send?text=" + texto, "_blank");
    }

    function ativarEventosInputs(container){
      container.querySelectorAll('input[list="listaFornecedores"]').forEach(inp => {
        inp.addEventListener("blur", () => {
          inp.value = (inp.value || "").trim().toUpperCase();
          atualizarListaFornecedoresLote();
          marcarNaoSalvo();
          salvarAutomatico();
        });
      });

      container.querySelectorAll("input[type='text'], select").forEach(inp => {
        inp.addEventListener("input", () => {
          marcarNaoSalvo();
          salvarAutomatico();
        });
        inp.addEventListener("change", () => {
          marcarNaoSalvo();
          salvarAutomatico();
        });
      });
    }

    function ativarEventosGlobais(){
      document.getElementById("dataReferencia").addEventListener("change", async () => {
        marcarNaoSalvo();
        await carregarDadosDaData();
      });

      document.getElementById("responsavel").addEventListener("input", () => {
        marcarNaoSalvo();
        salvarAutomatico();
      });

      document.getElementById("observacao").addEventListener("input", () => {
        marcarNaoSalvo();
        salvarAutomatico();
      });

      document.getElementById("fornecedorLote").addEventListener("change", marcarNaoSalvo);
    }
  </script>
</body>
</html>
