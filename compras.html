<script>
const TOTAL_DIAS=31;
const TOTAL_PRODUTOS=31;
const FORNECEDORES=6;
const SENHA="419";

// ===== LIBERAR APROVAÇÃO (senha 1x por sessão) =====
let aprovacaoLiberada = false;

function solicitarSenhaUmaVez(){
  if(aprovacaoLiberada) return true;
  if(sessionStorage.getItem("BSM_APROVACAO_LIBERADA")==="1"){
    aprovacaoLiberada = true;
    atualizarIndicadorAprovacao();
    return true;
  }
  const s = prompt("Digite a senha para LIBERAR as aprovações (1x):");
  if(s === SENHA){
    aprovacaoLiberada = true;
    sessionStorage.setItem("BSM_APROVACAO_LIBERADA","1");
    atualizarIndicadorAprovacao();
    return true;
  }
  alert("Senha incorreta.");
  return false;
}

function bloquearAprovacao(){
  aprovacaoLiberada = false;
  sessionStorage.removeItem("BSM_APROVACAO_LIBERADA");
  atualizarIndicadorAprovacao();
}

function atualizarIndicadorAprovacao(){
  const el = document.getElementById("indicAprov");
  if(!el) return;
  if(aprovacaoLiberada || sessionStorage.getItem("BSM_APROVACAO_LIBERADA")==="1"){
    el.textContent = "🔓 Aprovação liberada";
    el.style.background = "rgba(46,204,113,.18)";
    el.style.color = "#2ecc71";
  }else{
    el.textContent = "🔒 Aprovação bloqueada";
    el.style.background = "rgba(255,255,255,.10)";
    el.style.color = "#fff";
  }
}



function keyLock(d,p){ return `LOCK_${d}_${p}`; }

function lockProduto(d,p){
  const card=document.getElementById(`card_${d}_${p}`);
  if(!card) return;
  card.classList.add("locked");
  card.querySelectorAll("input").forEach(inp=>{ inp.disabled=true; });
  // desabilita botões OK, mas mantém desbloquear
  card.querySelectorAll("button").forEach(btn=>{
    if(btn.classList.contains("unlockBtn")) return;
    btn.disabled=true;
    btn.style.opacity="0.55";
    btn.style.cursor="not-allowed";
  });
  const badge=document.getElementById(`lock_${d}_${p}`);
  if(badge) badge.style.display="inline-flex";
  localStorage.setItem(keyLock(d,p),"1");
}

function unlockProduto(d,p){
  const senha=prompt("Digite a senha para DESBLOQUEAR:");
  if(senha!==SENHA){ alert("Senha incorreta"); return; }
  const card=document.getElementById(`card_${d}_${p}`);
  if(!card) return;
  card.classList.remove("locked");
  card.querySelectorAll("input").forEach(inp=>{ inp.disabled=false; });
  card.querySelectorAll("button").forEach(btn=>{
    btn.disabled=false;
    btn.style.opacity="";
    btn.style.cursor="";
  });
  const badge=document.getElementById(`lock_${d}_${p}`);
  if(badge) badge.style.display="none";
  localStorage.removeItem(keyLock(d,p));
}

function aplicarBloqueiosSalvos(){
  for(let d=1; d<=TOTAL_DIAS; d++){
    for(let p=1; p<=TOTAL_PRODUTOS; p++){
      if(localStorage.getItem(keyLock(d,p))==="1"){
        lockProduto(d,p);
      }
    }
  }
}


function criarSistema(){
 const tabs=document.getElementById("tabs");
 const container=document.getElementById("containerDias");

 for(let d=1;d<=TOTAL_DIAS;d++){
   const btn=document.createElement("button");
   btn.innerText="Dia "+d;
   btn.onclick=()=>abrirDia(d);
   if(d===1) btn.classList.add("active");
   tabs.appendChild(btn);

   const div=document.createElement("div");
   div.className="day";
   div.id="dia_"+d;
   if(d===1) div.classList.add("active");

   div.innerHTML=`<div class="grid">${gerarProdutos(d)}</div>`;
   container.appendChild(div);
 }
}

function gerarProdutos(d){
 let html="";
 for(let p=1;p<=TOTAL_PRODUTOS;p++){
   html+=`
   <div class="card" id="card_${d}_${p}">
   <h4>Produto ${p} <span class="lockBadge" id="lock_${d}_${p}" style="display:none;">🔒 BLOQUEADO</span><button class="unlockBtn" type="button" onclick="unlockProduto(${d},${p})" title="Desbloquear (senha)">🔓</button></h4>
   <input placeholder="Nome produto" id="prod_${d}_${p}"><br><br>
   <input placeholder="KG" type="number" id="kg_${d}_${p}" oninput="recalcular(${d},${p})"><br><br>
   <table>
   <tr><th>Fornecedor</th><th>V.Unit</th><th>Total</th><th>OK</th></tr>
   ${gerarFornecedores(d,p)}
   </table>
   </div>`;
 }
 return html;
}

function gerarFornecedores(d,p){
 let html="";
 for(let f=1;f<=FORNECEDORES;f++){
   html+=`
   <tr id="row_${d}_${p}_${f}">
   <td><input list="listaFornecedores" id="forn_${d}_${p}_${f}"></td>
   <td><input type="number" step="0.0001" id="vu_${d}_${p}_${f}" oninput="calcular(${d},${p},${f})"></td>
   <td id="total_${d}_${p}_${f}">0</td>
   <td><button onclick="aprovar(${d},${p},${f})">OK</button></td>
   </tr>`;
 }
 return html;
}

function abrirDia(d){
 document.querySelectorAll(".day").forEach(e=>e.classList.remove("active"));
 document.querySelectorAll(".tabs button").forEach(e=>e.classList.remove("active"));
 document.getElementById("dia_"+d).classList.add("active");
 document.querySelectorAll(".tabs button")[d-1].classList.add("active");
 atualizarDashboard(d);
}

function calcular(d,p,f){
 const kg=parseFloat(document.getElementById("kg_"+d+"_"+p).value||0);
 const vu=parseFloat(document.getElementById("vu_"+d+"_"+p+"_"+f).value||0);
 document.getElementById("total_"+d+"_"+p+"_"+f).innerText=(kg*vu).toFixed(2);
 destacarMenor(d,p);
}


function destacarMenor(d,p){
 let vals=[];
 for(let i=1;i<=FORNECEDORES;i++){
   const v=parseFloat(document.getElementById("total_"+d+"_"+p+"_"+i).innerText||0);
   if(v>0) vals.push(v);
 }
 const menor = vals.length ? Math.min(...vals) : 0;
 for(let i=1;i<=FORNECEDORES;i++){
   const row=document.getElementById("row_"+d+"_"+p+"_"+i);
   row.classList.remove("menor");
   const v=parseFloat(document.getElementById("total_"+d+"_"+p+"_"+i).innerText||0);
   if(menor>0 && v===menor) row.classList.add("menor");
 }
}

function recalcular(d,p){
 for(let f=1;f<=FORNECEDORES;f++) calcular(d,p,f);
}

function aprovar(d,p,f){
 if(!solicitarSenhaUmaVez()) return;
 for(let i=1;i<=FORNECEDORES;i++)
   document.getElementById("row_"+d+"_"+p+"_"+i).classList.remove("aprovado");
 document.getElementById("row_"+d+"_"+p+"_"+f).classList.add("aprovado");
 atualizarDashboard(d);
}

function atualizarDashboard(d){
 let total=0;
 for(let p=1;p<=TOTAL_PRODUTOS;p++){
   for(let f=1;f<=FORNECEDORES;f++){
     if(document.getElementById("row_"+d+"_"+p+"_"+f).classList.contains("aprovado"))
       total+=parseFloat(document.getElementById("total_"+d+"_"+p+"_"+f).innerText||0);
   }
 }
 document.getElementById("totalDia").innerText=total.toFixed(2);
}

function exportJSON(){
 let dados={};
 document.querySelectorAll("input").forEach(i=>dados[i.id]=i.value);
 document.querySelectorAll(".aprovado").forEach(r=>dados[r.id+"_aprovado"]=true);
 const blob=new Blob([JSON.stringify(dados)],{type:"application/json"});
 const link=document.createElement("a");
 link.href=URL.createObjectURL(blob);
 link.download="BSM_backup.json";
 link.click();
}

function importJSON(event){
 const file=event.target.files[0];
 if(!file) return;
 const reader=new FileReader();
 reader.onload=function(e){
   const dados=JSON.parse(e.target.result);

   // 1) preencher inputs
   for(let id in dados){
     const el=document.getElementById(id);
     if(el && el.tagName==="INPUT"){
       el.value = dados[id];
     }
   }

   // 2) limpar aprovações atuais
   document.querySelectorAll(".aprovado").forEach(r=>r.classList.remove("aprovado"));

   // 3) restaurar aprovações
   for(let id in dados){
     if(id.endsWith("_aprovado") && dados[id]){
       const real=id.replace("_aprovado","");
       const row=document.getElementById(real);
       if(row) row.classList.add("aprovado");
     }
   }

   // 4) recalcular TODOS os totais (KG × V.Unit) e menor preço
   for(let d=1; d<=TOTAL_DIAS; d++){
     for(let p=1; p<=TOTAL_PRODUTOS; p++){
       if(typeof recalcular==="function"){
         recalcular(d,p);
       }
     }
   }

   // 5) atualizar dashboard do dia ativo
   const activeBtn=document.querySelector(".tabs button.active");
   let diaAtual=1;
   if(activeBtn){
     const n=parseInt((activeBtn.innerText||"").replace(/\D+/g,"") || "1", 10);
     diaAtual=Math.max(1, Math.min(TOTAL_DIAS, n));
   }
   atualizarDashboard(diaAtual);

   // 6) reaplicar bloqueios salvos (se existir)
   if(typeof aplicarBloqueiosSalvos==="function"){
     setTimeout(aplicarBloqueiosSalvos, 50);
   }

   alert("Arquivo carregado e totais recalculados!");
 };
 reader.readAsText(file);
 // permite carregar o mesmo arquivo novamente
 event.target.value="";
}

function printReport(){ window.print(); }

function enviarWhatsApp(){
 let texto="*BSM - Orçamento Aprovado*%0A";
 document.querySelectorAll(".aprovado").forEach(r=>{
   const parts=r.id.split("_");
   const d=parts[1], p=parts[2], f=parts[3];
   const nome=document.getElementById("prod_"+d+"_"+p).value;
   const forn=document.getElementById("forn_"+d+"_"+p+"_"+f).value;
   const total=document.getElementById("total_"+d+"_"+p+"_"+f).innerText;
   texto+=`Dia ${d} - ${nome} - ${forn} - R$ ${total}%0A`;
 });
 window.open("https://wa.me/?text="+texto,"_blank");
}


function enviarWhatsNaoAprovados(){
 let texto="*BSM - Orçamento NÃO Aprovado*%0A";
 document.querySelectorAll("tr").forEach(r=>{
   if(!r.classList.contains("aprovado") && r.id && r.id.startsWith("row_")){
     const parts=r.id.split("_");
     const d=parts[1], p=parts[2], f=parts[3];
     const nome=document.getElementById("prod_"+d+"_"+p)?.value||"Produto "+p;
     const forn=document.getElementById("forn_"+d+"_"+p+"_"+f)?.value||"Fornecedor "+f;
     const total=document.getElementById("total_"+d+"_"+p+"_"+f)?.innerText||"0";
     if(parseFloat(total)>0){
       texto+=`Dia ${d} - ${nome} - ${forn} - R$ ${total}%0A`;
     }
   }
 });
 window.open("https://wa.me/?text="+texto,"_blank");
}


// ===== Melhorias fornecedor (autocomplete da lista + padronização) =====
function normalizarFornecedorInputs(){
  document.querySelectorAll('input[list="listaFornecedores"]').forEach(inp=>{
    inp.addEventListener('blur', ()=>{
      inp.value = (inp.value||"").trim().toUpperCase();
    });
  });
}

criarSistema();
setTimeout(atualizarIndicadorAprovacao, 80);

setTimeout(normalizarFornecedorInputs, 150);

setTimeout(aplicarBloqueiosSalvos, 50);
</script>
