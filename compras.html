<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSM - Sistema de Compras</title>
<style>
body{font-family:Arial;margin:0;background:#0f2b4a;color:#fff}
header{background:#0c223a;padding:15px;text-align:center;font-size:20px;font-weight:bold}
.topbar{padding:10px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
button.action{padding:8px 14px;border-radius:20px;border:none;cursor:pointer;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:15px;padding:15px}
.card{background:#173a63;border-radius:14px;padding:10px}
table{width:100%;border-collapse:collapse}
th,td{padding:4px;text-align:center}
input{width:95%;padding:4px;border-radius:6px;border:none}
.aprovado td{
  background: rgba(46,204,113,0.18);
  color:#2ecc71 !important;
  font-weight:900;
  font-style: italic;
}
.menor{background:#f1c40f;color:#000;font-weight:bold}
.dashboard{background:#0c223a;padding:10px;margin:10px;border-radius:12px;text-align:center}

.card.locked{outline:2px solid rgba(46,204,113,.55); box-shadow:0 10px 24px rgba(0,0,0,.22);}
.lockBadge{
  display:inline-flex; align-items:center; gap:6px;
  font-size:11px; font-weight:900;
  padding:4px 10px; border-radius:999px;
  background:rgba(46,204,113,.18); color:#2ecc71;
  margin-left:8px;
}
.unlockBtn{
  float:right;
  padding:6px 10px; border-radius:10px; border:none;
  cursor:pointer; font-weight:900;
  background:rgba(255,255,255,.12); color:#fff;
}
.unlockBtn:hover{filter:brightness(1.08);}

label.top-date{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:bold;
  background:rgba(255,255,255,.08);
  padding:8px 12px;
  border-radius:12px;
}
label.top-date input{
  width:auto;
  min-width:160px;
  padding:8px;
}

@media print{
  .topbar, .unlockBtn { display:none !important; }
  body{background:#fff;color:#000}
  .card, .dashboard, header{background:#fff;color:#000;border:1px solid #ccc}
}
</style>
</head>

<script>
const TOTAL_PRODUTOS = 31;
const FORNECEDORES = 6;
const SENHA = "419";

let aprovacaoLiberada = false;

function chaveDaData() {
  const data = document.getElementById("dataReferencia").value;
  return data ? `BSM_COMPRAS_${data}` : null;
}

function solicitarSenhaUmaVez(){
  if(aprovacaoLiberada) return true;
  if(sessionStorage.getItem("BSM_APROVACAO_LIBERADA")==="1"){
    aprovacaoLiberada = true;
    atualizarIndicadorAprovacao();
    return true;
  }
  const s = prompt("Digite a senha para LIBERAR as aprovações (1x):");
  if(s === SENHA){
    aprovacaoLiberada = true;
    sessionStorage.setItem("BSM_APROVACAO_LIBERADA","1");
    atualizarIndicadorAprovacao();
    return true;
  }
  alert("Senha incorreta.");
  return false;
}

function bloquearAprovacao(){
  aprovacaoLiberada = false;
  sessionStorage.removeItem("BSM_APROVACAO_LIBERADA");
  atualizarIndicadorAprovacao();
}

function atualizarIndicadorAprovacao(){
  const el = document.getElementById("indicAprov");
  if(!el) return;
  if(aprovacaoLiberada || sessionStorage.getItem("BSM_APROVACAO_LIBERADA")==="1"){
    el.textContent = "🔓 Aprovação liberada";
    el.style.background = "rgba(46,204,113,.18)";
    el.style.color = "#2ecc71";
  } else {
    el.textContent = "🔒 Aprovação bloqueada";
    el.style.background = "rgba(255,255,255,.10)";
    el.style.color = "#fff";
  }
}

function keyLock(p){
  const data = document.getElementById("dataReferencia").value || "sem_data";
  return `LOCK_${data}_${p}`;
}

function lockProduto(p){
  const card = document.getElementById(`card_${p}`);
  if(!card) return;

  card.classList.add("locked");
  card.querySelectorAll("input").forEach(inp => { inp.disabled = true; });
  card.querySelectorAll("button").forEach(btn => {
    if(btn.classList.contains("unlockBtn")) return;
    btn.disabled = true;
    btn.style.opacity = "0.55";
    btn.style.cursor = "not-allowed";
  });

  const badge = document.getElementById(`lock_${p}`);
  if(badge) badge.style.display = "inline-flex";

  localStorage.setItem(keyLock(p), "1");
  salvarAutomatico();
}

function unlockProduto(p){
  const senha = prompt("Digite a senha para DESBLOQUEAR:");
  if(senha !== SENHA){
    alert("Senha incorreta");
    return;
  }

  const card = document.getElementById(`card_${p}`);
  if(!card) return;

  card.classList.remove("locked");
  card.querySelectorAll("input").forEach(inp => { inp.disabled = false; });
  card.querySelectorAll("button").forEach(btn => {
    btn.disabled = false;
    btn.style.opacity = "";
    btn.style.cursor = "";
  });

  const badge = document.getElementById(`lock_${p}`);
  if(badge) badge.style.display = "none";

  localStorage.removeItem(keyLock(p));
  salvarAutomatico();
}

function aplicarBloqueiosSalvos(){
  for(let p=1; p<=TOTAL_PRODUTOS; p++){
    const card = document.getElementById(`card_${p}`);
    if(!card) continue;

    if(localStorage.getItem(keyLock(p)) === "1"){
      card.classList.add("locked");
      card.querySelectorAll("input").forEach(inp => { inp.disabled = true; });
      card.querySelectorAll("button").forEach(btn => {
        if(btn.classList.contains("unlockBtn")) return;
        btn.disabled = true;
        btn.style.opacity = "0.55";
        btn.style.cursor = "not-allowed";
      });
      const badge = document.getElementById(`lock_${p}`);
      if(badge) badge.style.display = "inline-flex";
    } else {
      card.classList.remove("locked");
      card.querySelectorAll("input").forEach(inp => { inp.disabled = false; });
      card.querySelectorAll("button").forEach(btn => {
        btn.disabled = false;
        btn.style.opacity = "";
        btn.style.cursor = "";
      });
      const badge = document.getElementById(`lock_${p}`);
      if(badge) badge.style.display = "none";
    }
  }
}

function criarSistema(){
  const container = document.getElementById("containerProdutos");
  let html = "";
  for(let p=1; p<=TOTAL_PRODUTOS; p++){
    html += `
    <div class="card" id="card_${p}">
      <h4>
        Produto ${p}
        <span class="lockBadge" id="lock_${p}" style="display:none;">🔒 BLOQUEADO</span>
        <button class="unlockBtn" type="button" onclick="unlockProduto(${p})" title="Desbloquear (senha)">🔓</button>
      </h4>
      <input placeholder="Nome produto" id="prod_${p}"><br><br>
      <input placeholder="KG" type="number" id="kg_${p}" oninput="recalcular(${p})"><br><br>
      <table>
        <tr><th>Fornecedor</th><th>V.Unit</th><th>Total</th><th>OK</th></tr>
        ${gerarFornecedores(p)}
      </table>
    </div>`;
  }
  container.innerHTML = html;
}

function gerarFornecedores(p){
  let html = "";
  for(let f=1; f<=FORNECEDORES; f++){
    html += `
    <tr id="row_${p}_${f}">
      <td><input list="listaFornecedores" id="forn_${p}_${f}"></td>
      <td><input type="number" step="0.0001" id="vu_${p}_${f}" oninput="calcular(${p},${f})"></td>
      <td id="total_${p}_${f}">0</td>
      <td><button type="button" onclick="aprovar(${p},${f})">OK</button></td>
    </tr>`;
  }
  return html;
}

function calcular(p,f){
  const kg = parseFloat(document.getElementById(`kg_${p}`).value || 0);
  const vu = parseFloat(document.getElementById(`vu_${p}_${f}`).value || 0);
  document.getElementById(`total_${p}_${f}`).innerText = (kg * vu).toFixed(2);
  destacarMenor(p);
  salvarAutomatico();
}

function recalcular(p){
  for(let f=1; f<=FORNECEDORES; f++){
    calcular(p,f);
  }
}

function destacarMenor(p){
  let vals = [];
  for(let i=1; i<=FORNECEDORES; i++){
    const v = parseFloat(document.getElementById(`total_${p}_${i}`).innerText || 0);
    if(v > 0) vals.push(v);
  }

  const menor = vals.length ? Math.min(...vals) : 0;

  for(let i=1; i<=FORNECEDORES; i++){
    const row = document.getElementById(`row_${p}_${i}`);
    row.classList.remove("menor");
    const v = parseFloat(document.getElementById(`total_${p}_${i}`).innerText || 0);
    if(menor > 0 && v === menor) row.classList.add("menor");
  }
}

function aprovar(p,f){
  if(!solicitarSenhaUmaVez()) return;

  for(let i=1; i<=FORNECEDORES; i++){
    document.getElementById(`row_${p}_${i}`).classList.remove("aprovado");
  }

  document.getElementById(`row_${p}_${f}`).classList.add("aprovado");
  atualizarDashboard();
  salvarAutomatico();
}

function atualizarDashboard(){
  let total = 0;

  for(let p=1; p<=TOTAL_PRODUTOS; p++){
    for(let f=1; f<=FORNECEDORES; f++){
      if(document.getElementById(`row_${p}_${f}`).classList.contains("aprovado")){
        total += parseFloat(document.getElementById(`total_${p}_${f}`).innerText || 0);
      }
    }
  }

  document.getElementById("totalDia").innerText = total.toFixed(2);
  atualizarDataExibida();
}

function formatarDataBR(dataISO){
  if(!dataISO) return "-";
  const partes = dataISO.split("-");
  if(partes.length !== 3) return dataISO;
  return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

function atualizarDataExibida(){
  const dataEl = document.getElementById("dataReferencia");
  const out = document.getElementById("dataExibida");
  if(out){
    out.innerText = dataEl && dataEl.value ? formatarDataBR(dataEl.value) : "-";
  }
}

function montarDadosTela(){
  const dados = {
    inputs: {},
    aprovados: [],
    dataReferencia: document.getElementById("dataReferencia").value || ""
  };

  document.querySelectorAll("#containerProdutos input").forEach(inp => {
    if(inp.id) dados.inputs[inp.id] = inp.value;
  });

  document.querySelectorAll("#containerProdutos tr.aprovado").forEach(tr => {
    dados.aprovados.push(tr.id);
  });

  return dados;
}

function limparTela(){
  document.querySelectorAll("#containerProdutos input").forEach(inp => inp.value = "");
  document.querySelectorAll(".aprovado").forEach(r => r.classList.remove("aprovado"));

  for(let p=1; p<=TOTAL_PRODUTOS; p++){
    for(let f=1; f<=FORNECEDORES; f++){
      document.getElementById(`total_${p}_${f}`).innerText = "0";
    }
    destacarMenor(p);
  }

  atualizarDashboard();
}

function salvarAutomatico(){
  const chave = chaveDaData();
  if(!chave) return;
  const dados = montarDadosTela();
  localStorage.setItem(chave, JSON.stringify(dados));
}

function carregarDadosDaData(){
  limparTela();

  const chave = chaveDaData();
  if(!chave) return;

  const bruto = localStorage.getItem(chave);
  if(!bruto){
    aplicarBloqueiosSalvos();
    atualizarDashboard();
    return;
  }

  try{
    const dados = JSON.parse(bruto);

    if(dados.inputs){
      for(const id in dados.inputs){
        const el = document.getElementById(id);
        if(el) el.value = dados.inputs[id];
      }
    }

    if(dados.aprovados){
      dados.aprovados.forEach(id => {
        const row = document.getElementById(id);
        if(row) row.classList.add("aprovado");
      });
    }

    for(let p=1; p<=TOTAL_PRODUTOS; p++){
      for(let f=1; f<=FORNECEDORES; f++){
        const kg = parseFloat(document.getElementById(`kg_${p}`).value || 0);
        const vu = parseFloat(document.getElementById(`vu_${p}_${f}`).value || 0);
        document.getElementById(`total_${p}_${f}`).innerText = (kg * vu).toFixed(2);
      }
      destacarMenor(p);
    }

    aplicarBloqueiosSalvos();
    atualizarDashboard();
  } catch(e){
    console.error("Erro ao carregar dados da data:", e);
  }
}

function limparDadosDaData(){
  const chave = chaveDaData();
  const data = document.getElementById("dataReferencia").value;

  if(!data){
    alert("Selecione uma data primeiro.");
    return;
  }

  if(confirm(`Deseja apagar os dados salvos da data ${formatarDataBR(data)}?`)){
    localStorage.removeItem(chave);

    for(let p=1; p<=TOTAL_PRODUTOS; p++){
      localStorage.removeItem(keyLock(p));
    }

    limparTela();
    aplicarBloqueiosSalvos();
    atualizarDashboard();
  }
}

function definirDataHojeSeVazia(){
  const dataEl = document.getElementById("dataReferencia");
  if(dataEl && !dataEl.value){
    const hoje = new Date();
    const ano = hoje.getFullYear();
    const mes = String(hoje.getMonth() + 1).padStart(2, "0");
    const dia = String(hoje.getDate()).padStart(2, "0");
    dataEl.value = `${ano}-${mes}-${dia}`;
  }
  atualizarDataExibida();
}

function printReport(){
  window.print();
}

function enviarWhatsApp(){
  let texto = "*BSM - Orçamento Aprovado*%0A";
  const data = document.getElementById("dataReferencia").value;
  texto += `Data: ${formatarDataBR(data)}%0A%0A`;

  document.querySelectorAll(".aprovado").forEach(r => {
    const parts = r.id.split("_");
    const p = parts[1], f = parts[2];
    const nome = document.getElementById(`prod_${p}`).value;
    const forn = document.getElementById(`forn_${p}_${f}`).value;
    const total = document.getElementById(`total_${p}_${f}`).innerText;
    texto += `${nome} - ${forn} - R$ ${total}%0A`;
  });

  window.open("https://wa.me/?text=" + texto, "_blank");
}

function enviarWhatsNaoAprovados(){
  let texto = "*BSM - Orçamento NÃO Aprovado*%0A";
  const data = document.getElementById("dataReferencia").value;
  texto += `Data: ${formatarDataBR(data)}%0A%0A`;

  document.querySelectorAll("tr").forEach(r => {
    if(!r.classList.contains("aprovado") && r.id && r.id.startsWith("row_")){
      const parts = r.id.split("_");
      const p = parts[1], f = parts[2];
      const nome = document.getElementById(`prod_${p}`)?.value || "Produto " + p;
      const forn = document.getElementById(`forn_${p}_${f}`)?.value || "Fornecedor " + f;
      const total = document.getElementById(`total_${p}_${f}`)?.innerText || "0";
      if(parseFloat(total) > 0){
        texto += `${nome} - ${forn} - R$ ${total}%0A`;
      }
    }
  });

  window.open("https://wa.me/?text=" + texto, "_blank");
}

function normalizarFornecedorInputs(){
  document.querySelectorAll('input[list="listaFornecedores"]').forEach(inp => {
    inp.addEventListener("blur", () => {
      inp.value = (inp.value || "").trim().toUpperCase();
      salvarAutomatico();
    });
  });
}

function ativarEventos(){
  document.querySelectorAll("#containerProdutos input").forEach(inp => {
    inp.addEventListener("input", salvarAutomatico);
    inp.addEventListener("change", salvarAutomatico);
  });

  const dataEl = document.getElementById("dataReferencia");
  dataEl.addEventListener("change", () => {
    atualizarDataExibida();
    carregarDadosDaData();
  });
  dataEl.addEventListener("input", () => {
    atualizarDataExibida();
  });
}

criarSistema();
definirDataHojeSeVazia();
carregarDadosDaData();
atualizarIndicadorAprovacao();
normalizarFornecedorInputs();
ativarEventos();
</script>
