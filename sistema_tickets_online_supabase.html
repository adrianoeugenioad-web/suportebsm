<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPORTE BSM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

.topo {
  background: #0b1f3a;
  color: white;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 700px;
  margin: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #0b1f3a;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 5px;
}

button:hover {
  background: #163a6b;
}

.menu {
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

table th, table td {
  padding: 8px;
  border: 1px solid #ddd;
  text-align: left;
}

table th {
  background: #f0f2f5;
}

#conteudo {
  margin-top: 20px;
}

.ticket-card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 12px;
  border: 1px solid #ddd;
}

.tag {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  margin-right: 6px;
}

.aberto { background: #dbeafe; color: #1d4ed8; }
.andamento { background: #fef3c7; color: #b45309; }
.finalizado { background: #dcfce7; color: #15803d; }

.baixa { background: #e5e7eb; color: #374151; }
.media { background: #cffafe; color: #0f766e; }
.alta { background: #fee2e2; color: #b91c1c; }

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="topo">SUPORTE BSM</div>

<div class="container">

  <div id="loginBox" class="card">
    <h3>Login</h3>

    <label>Usuário</label>
    <input type="text" id="usuario" placeholder="Ex.: adriano">

    <label>Senha</label>
    <input type="password" id="senha" placeholder="Sua senha">

    <button onclick="login()">Entrar</button>

    <div id="msgLogin" style="color:red; margin-top:10px;"></div>
  </div>

  <div id="sistema" class="hidden">
    <div class="menu">
      <button onclick="novoChamado()">Novo Chamado</button>
      <button onclick="listarChamados()">Meus Chamados</button>
      <button onclick="listarTodos()" id="btnTodos" class="hidden">Todos Chamados</button>
      <button onclick="logout()">Sair</button>
    </div>

    <div id="conteudo"></div>
  </div>

</div>

<script>
    const SUPABASE_URL = "https://xzxcxalmarshffueylxw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Q1EXGzQ7WjCXwdgLjyGhFQ_pTu5QFYX";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let usuarioLogado = null;
let role = null;

// LOGIN
async function login() {
  const usuarioDigitado = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value;

  const { data, error } = await client
    .from("profiles")
    .select("*")
    .ilike("username", usuarioDigitado)
    .single();

  if (error || !data) {
    document.getElementById("msgLogin").innerText = "Usuário não encontrado";
    return;
  }

  const { error: erroLogin } = await client.auth.signInWithPassword({
    email: data.email,
    password: senha
  });

  if (erroLogin) {
    document.getElementById("msgLogin").innerText = "Senha inválida";
    return;
  }

  usuarioLogado = data.username;
  role = data.role;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("sistema").classList.remove("hidden");

  if (role === "admin" || role === "administrador") {
    document.getElementById("btnTodos").classList.remove("hidden");
  }

  listarChamados();
}

// LOGOUT
async function logout() {
  await client.auth.signOut();
  location.reload();
}

// FORM NOVO CHAMADO
function novoChamado() {
  document.getElementById("conteudo").innerHTML = `
    <div class="card">
      <h3>Novo Chamado</h3>

      <label>Título</label>
      <input type="text" id="titulo">

      <label>Descrição</label>
      <textarea id="descricao"></textarea>

      <label>Prioridade</label>
      <select id="prioridade">
        <option value="Baixa">Baixa</option>
        <option value="Média">Média</option>
        <option value="Alta">Alta</option>
      </select>

      <button onclick="salvarChamado()">Salvar</button>
    </div>
  `;
}

// GERAR NÚMERO
function gerarNumeroChamado() {
  const numero = Math.floor(Math.random() * 90000) + 10000;
  return "BSM-" + numero;
}

// SALVAR CHAMADO
async function salvarChamado() {
  const titulo = document.getElementById("titulo").value.trim();
  const descricao = document.getElementById("descricao").value.trim();
  const prioridade = document.getElementById("prioridade").value;
  const numero = gerarNumeroChamado();

  if (!titulo || !descricao) {
    alert("Preencha título e descrição.");
    return;
  }

  const { error } = await client.from("tickets").insert([
    {
      numero: numero,
      titulo: titulo,
      descricao: descricao,
      prioridade: prioridade,
      status: "Aberto",
      usuario: usuarioLogado
    }
  ]);

  if (error) {
    alert("Erro ao salvar chamado: " + error.message);
    return;
  }

  alert("Chamado criado com sucesso: " + numero);
  listarChamados();
}

// LISTAR MEUS CHAMADOS
async function listarChamados() {
  const { data, error } = await client
    .from("tickets")
    .select("*")
    .eq("usuario", usuarioLogado)
    .order("id", { ascending: false });

  if (error) {
    document.getElementById("conteudo").innerHTML = "Erro ao carregar chamados.";
    return;
  }

  montarCards(data, false);
}

// LISTAR TODOS
async function listarTodos() {
  const { data, error } = await client
    .from("tickets")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    document.getElementById("conteudo").innerHTML = "Erro ao carregar todos os chamados.";
    return;
  }

  montarCards(data, true);
}

// FINALIZAR
async function finalizarChamado(id) {
  const { error } = await client
    .from("tickets")
    .update({ status: "Finalizado" })
    .eq("id", id);

  if (error) {
    alert("Erro ao finalizar chamado.");
    return;
  }

  listarTodos();
}

// EM ANDAMENTO
async function atendimentoChamado(id) {
  const { error } = await client
    .from("tickets")
    .update({ status: "Em andamento" })
    .eq("id", id);

  if (error) {
    alert("Erro ao atualizar chamado.");
    return;
  }

  listarTodos();
}

// MONTAR TELA
function montarCards(data, admin = false) {
  if (!data || data.length === 0) {
    document.getElementById("conteudo").innerHTML = "<div class='card'>Nenhum chamado encontrado.</div>";
    return;
  }

  let html = "";

  data.forEach(t => {
    let statusClass = "";
    let prioridadeClass = "";

    if (t.status === "Aberto") statusClass = "aberto";
    if (t.status === "Em andamento") statusClass = "andamento";
    if (t.status === "Finalizado") statusClass = "finalizado";

    if (t.prioridade === "Baixa") prioridadeClass = "baixa";
    if (t.prioridade === "Média") prioridadeClass = "media";
    if (t.prioridade === "Alta") prioridadeClass = "alta";

    html += `
      <div class="ticket-card">
        <div>
          <span class="tag ${statusClass}">${t.status || ""}</span>
          <span class="tag ${prioridadeClass}">${t.prioridade || ""}</span>
        </div>

        <h3>${t.numero || ""}</h3>
        <strong>${t.titulo || ""}</strong>
        <p>${t.descricao || ""}</p>
        <p><b>Usuário:</b> ${t.usuario || ""}</p>
        <p><b>Data:</b> ${t.data_abertura || ""}</p>
    `;

    if (admin) {
      html += `
        <button onclick="atendimentoChamado(${t.id})">Em andamento</button>
        <button onclick="finalizarChamado(${t.id})">Finalizar</button>
      `;
    }

    html += `</div>`;
  });

  document.getElementById("conteudo").innerHTML = html;
}
</script>

</body>
</html>
