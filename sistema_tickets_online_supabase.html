<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUPORTE BSM - LOGIN POR USUÁRIO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .topo {
      background: #081427;
      color: #fff;
      padding: 20px;
    }
    .topo h1 {
      margin: 0;
      font-size: 30px;
    }
    .topo p {
      margin: 6px 0 0;
      color: #d1d5db;
    }
    .container {
      max-width: 1380px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .linha2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .linha3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .box {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }
    .box strong {
      display: block;
      font-size: 28px;
      margin-top: 4px;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      margin-top: 6px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    textarea { min-height: 95px; resize: vertical; }
    button {
      background: #081427;
      color: white;
      border: none;
      padding: 11px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    button:hover { opacity: .95; }
    .btn-green { background: #15803d; }
    .btn-yellow { background: #b45309; }
    .btn-red { background: #b91c1c; }
    .btn-gray { background: #374151; }
    .btn-blue { background: #1d4ed8; }
    .ticket {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      background: #fafafa;
    }
    .status, .prioridade {
      display: inline-block;
      font-size: 12px;
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 999px;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .aberto { background: #dbeafe; color: #1d4ed8; }
    .andamento { background: #fef3c7; color: #b45309; }
    .finalizado { background: #dcfce7; color: #15803d; }
    .baixa { background: #e5e7eb; color: #374151; }
    .media { background: #cffafe; color: #0f766e; }
    .alta { background: #fee2e2; color: #b91c1c; }
    .acoes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .msg {
      margin-top: 10px;
      font-weight: bold;
    }
    .hidden { display: none !important; }
    .resumo {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.6;
    }
    .userbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .thumb {
      margin-top: 10px;
      max-width: 220px;
      border-radius: 12px;
      border: 1px solid #ddd;
    }
    .mini {
      font-size: 12px;
      color: #6b7280;
    }
    h2, h3 { margin-top: 0; }
    @media (max-width: 950px) {
      .grid, .linha2, .linha3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="topo">
    <h1>SUPORTE BSM</h1>
    <p>Login por usuário e senha</p>
  </div>

  <div class="container">
    <div id="authBox" class="card">
      <h2>Login</h2>

      <div class="linha2">
        <div>
          <label>Nome completo (somente cadastro)</label>
          <input type="text" id="cadNome" placeholder="Seu nome completo" />
        </div>
        <div>
          <label>Usuário</label>
          <input type="text" id="authUsuario" placeholder="Ex.: adriano" />
        </div>
      </div>

      <label>Senha</label>
      <input type="password" id="authSenha" placeholder="Sua senha" />

      <button class="btn-blue" onclick="registrar()">Criar conta</button>
      <button onclick="entrar()">Entrar</button>

      <div id="authMsg" class="msg"></div>
    </div>

    <div id="appBox" class="hidden">
      <div class="userbar card">
        <div>
          <strong id="userNome">Usuário</strong><br>
          <span class="mini" id="userInfo"></span>
        </div>
        <div>
          <button class="btn-gray" onclick="sair()">Sair</button>
        </div>
      </div>

      <div class="dashboard">
        <div class="box"><span>Total</span><strong id="dashTotal">0</strong></div>
        <div class="box"><span>Abertos</span><strong id="dashAbertos">0</strong></div>
        <div class="box"><span>Em andamento</span><strong id="dashAndamento">0</strong></div>
        <div class="box"><span>Finalizados</span><strong id="dashFinalizados">0</strong></div>
        <div class="box"><span>Prioridade alta</span><strong id="dashAlta">0</strong></div>
        <div class="box"><span>Hoje</span><strong id="dashHoje">0</strong></div>
      </div>

      <div class="grid">
        <div class="card">
          <h2 id="tituloFormulario">Abrir novo chamado</h2>

          <label>Solicitante</label>
          <input type="text" id="solicitante" placeholder="Nome de quem está abrindo o chamado" />

          <label>Título</label>
          <input type="text" id="titulo" placeholder="Ex.: Impressora não está funcionando" />

          <label>Descrição</label>
          <textarea id="descricao" placeholder="Descreva o problema"></textarea>

          <div class="linha3">
            <div>
              <label>Setor</label>
              <select id="setor">
                <option value="TI">TI</option>
                <option value="Manutenção">Manutenção</option>
                <option value="Frota">Frota</option>
                <option value="Compras">Compras</option>
                <option value="RH">RH</option>
                <option value="Produção">Produção</option>
                <option value="Estoque">Estoque</option>
              </select>
            </div>
            <div>
              <label>Prioridade</label>
              <select id="prioridade">
                <option value="Baixa">Baixa</option>
                <option value="Média">Média</option>
                <option value="Alta">Alta</option>
              </select>
            </div>
            <div>
              <label>Responsável</label>
              <input type="text" id="responsavel" placeholder="Responsável" />
            </div>
          </div>

          <label>Foto do chamado</label>
          <input type="file" id="foto" accept="image/*" />
          <img id="previewFoto" class="thumb hidden" alt="Prévia da foto" />

          <button id="btnSalvar" onclick="salvarOuAtualizar()">Salvar chamado</button>
          <button id="btnCancelar" class="btn-gray hidden" onclick="cancelarEdicao()">Cancelar edição</button>

          <div id="mensagem" class="msg"></div>
        </div>

        <div class="card">
          <h2>Filtros</h2>

          <label>Buscar</label>
          <input type="text" id="busca" placeholder="Buscar por número, título, setor..." onkeyup="listarTickets()" />

          <div class="linha3">
            <div>
              <label>Status</label>
              <select id="filtroStatus" onchange="listarTickets()">
                <option value="">Todos</option>
                <option value="Aberto">Aberto</option>
                <option value="Em andamento">Em andamento</option>
                <option value="Finalizado">Finalizado</option>
              </select>
            </div>
            <div>
              <label>Setor</label>
              <select id="filtroSetor" onchange="listarTickets()">
                <option value="">Todos</option>
                <option value="TI">TI</option>
                <option value="Manutenção">Manutenção</option>
                <option value="Frota">Frota</option>
                <option value="Compras">Compras</option>
                <option value="RH">RH</option>
                <option value="Produção">Produção</option>
                <option value="Estoque">Estoque</option>
              </select>
            </div>
            <div>
              <label>Período</label>
              <select id="filtroPeriodo" onchange="aplicarPeriodoRapido()">
                <option value="">Todos</option>
                <option value="hoje">Hoje</option>
                <option value="ontem">Ontem</option>
                <option value="semana">Esta semana</option>
                <option value="mes">Este mês</option>
              </select>
            </div>
          </div>

          <div class="linha2">
            <div>
              <label>Data inicial</label>
              <input type="date" id="dataInicial" onchange="listarTickets()" />
            </div>
            <div>
              <label>Data final</label>
              <input type="date" id="dataFinal" onchange="listarTickets()" />
            </div>
          </div>

          <button class="btn-gray" onclick="listarTickets()">Atualizar lista</button>
        </div>
      </div>

      <div class="card" style="margin-top:20px;">
        <h2 id="tituloLista">Meus chamados</h2>
        <div id="listaTickets">Carregando...</div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xzxcxalmarshffueylxw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Q1EXGzQ7WjCXwdgLjyGhFQ_pTu5QFYX";
    const SENHA_ADMIN = "_Cpd419_";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentProfile = null;
    let ticketEditandoId = null;
    let todosTickets = [];

    document.getElementById("foto").addEventListener("change", function (e) {
      const file = e.target.files[0];
      const img = document.getElementById("previewFoto");
      if (!file) {
        img.classList.add("hidden");
        img.src = "";
        return;
      }
      img.src = URL.createObjectURL(file);
      img.classList.remove("hidden");
    });

    function mostrarAuthMsg(texto, cor = "green") {
      const el = document.getElementById("authMsg");
      el.innerText = texto;
      el.style.color = cor;
    }

    function mostrarMensagem(texto, cor = "green") {
      const el = document.getElementById("mensagem");
      el.innerText = texto;
      el.style.color = cor;
    }

    function pedirSenhaAdmin() {
      const senha = prompt("Digite a senha do admin:");
      return senha === SENHA_ADMIN;
    }

    function classeStatus(status) {
      if (status === "Aberto") return "aberto";
      if (status === "Em andamento") return "andamento";
      if (status === "Finalizado") return "finalizado";
      return "";
    }

    function classePrioridade(prioridade) {
      if (prioridade === "Baixa") return "baixa";
      if (prioridade === "Média") return "media";
      if (prioridade === "Alta") return "alta";
      return "";
    }

    function limparFormulario() {
      document.getElementById("solicitante").value = currentProfile?.full_name || "";
      document.getElementById("titulo").value = "";
      document.getElementById("descricao").value = "";
      document.getElementById("setor").value = "TI";
      document.getElementById("prioridade").value = "Baixa";
      document.getElementById("responsavel").value = "";
      document.getElementById("foto").value = "";
      document.getElementById("previewFoto").classList.add("hidden");
      document.getElementById("previewFoto").src = "";
    }

    function cancelarEdicao() {
      ticketEditandoId = null;
      document.getElementById("tituloFormulario").innerText = "Abrir novo chamado";
      document.getElementById("btnSalvar").innerText = "Salvar chamado";
      document.getElementById("btnCancelar").classList.add("hidden");
      limparFormulario();
      mostrarMensagem("");
    }

    function gerarEmailInterno(username) {
      return `${username.toLowerCase()}@suportebsm.local`;
    }

    async function registrar() {
      const nome = document.getElementById("cadNome").value.trim();
      const usuario = document.getElementById("authUsuario").value.trim().toLowerCase();
      const senha = document.getElementById("authSenha").value.trim();

      if (!nome || !usuario || !senha) {
        mostrarAuthMsg("Preencha nome, usuário e senha.", "red");
        return;
      }

      const { data: userExists } = await client
        .from("profiles")
        .select("id")
        .eq("username", usuario)
        .limit(1);

      if (userExists && userExists.length) {
        mostrarAuthMsg("Esse usuário já existe.", "red");
        return;
      }

      const emailInterno = gerarEmailInterno(usuario);
      const role = ["adriano", "leonardo"].includes(usuario) ? "admin" : "usuario";

      const { data, error } = await client.auth.signUp({
        email: emailInterno,
        password: senha
      });

      if (error) {
        mostrarAuthMsg("Erro ao criar conta: " + error.message, "red");
        return;
      }

      if (data.user) {
        const { error: profileError } = await client
          .from("profiles")
          .upsert({
            id: data.user.id,
            email: emailInterno,
            full_name: nome,
            username: usuario,
            role: role
          });

        if (profileError) {
          mostrarAuthMsg("Conta criada, mas erro ao salvar perfil: " + profileError.message, "red");
          return;
        }
      }

      mostrarAuthMsg("Conta criada com sucesso. Agora clique em Entrar.", "green");
    }

    async function entrar() {
      const usuario = document.getElementById("authUsuario").value.trim().toLowerCase();
      const senha = document.getElementById("authSenha").value.trim();

      if (!usuario || !senha) {
        mostrarAuthMsg("Informe usuário e senha.", "red");
        return;
      }

      const { data: rows, error: lookupError } = await client
        .from("profiles")
        .select("email")
        .eq("username", usuario)
        .limit(1);

      if (lookupError || !rows || !rows.length) {
        mostrarAuthMsg("Usuário não encontrado.", "red");
        return;
      }

      const email = rows[0].email;

      const { error } = await client.auth.signInWithPassword({
        email,
        password: senha
      });

      if (error) {
        mostrarAuthMsg("Usuário ou senha inválidos.", "red");
        return;
      }

      await carregarSessao();
    }

    async function sair() {
      await client.auth.signOut();
      currentUser = null;
      currentProfile = null;
      document.getElementById("appBox").classList.add("hidden");
      document.getElementById("authBox").classList.remove("hidden");
    }

    async function carregarSessao() {
      const { data } = await client.auth.getSession();
      if (!data.session) {
        document.getElementById("appBox").classList.add("hidden");
        document.getElementById("authBox").classList.remove("hidden");
        return;
      }

      currentUser = data.session.user;

      const { data: profileRows, error: profileError } = await client
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .limit(1);

      if (profileError) {
        mostrarAuthMsg("Erro ao carregar perfil: " + profileError.message, "red");
        return;
      }

      if (!profileRows || !profileRows.length) {
        mostrarAuthMsg("Perfil não encontrado no banco.", "red");
        return;
      }

      currentProfile = profileRows[0];

      document.getElementById("authBox").classList.add("hidden");
      document.getElementById("appBox").classList.remove("hidden");

      document.getElementById("userNome").innerText = currentProfile.full_name || currentProfile.username || "Usuário";
      document.getElementById("userInfo").innerText =
        (currentProfile.username || "") + " | Perfil: " + (currentProfile.role || "usuario");

      document.getElementById("tituloLista").innerText =
        currentProfile.role === "admin" ? "Todos os chamados" : "Meus chamados";

      document.getElementById("solicitante").value = currentProfile.full_name || "";

      await listarTickets();
    }

    async function salvarOuAtualizar() {
      if (ticketEditandoId) {
        await atualizarTicket();
      } else {
        await criarTicket();
      }
    }

    async function uploadFotoSeExistir() {
      const file = document.getElementById("foto").files[0];
      if (!file) return { foto_path: null, foto_url: null };

      const ext = file.name.split(".").pop() || "jpg";
      const nome = `${currentUser.id}/${Date.now()}.${ext}`;

      const { error } = await client.storage
        .from("tickets-fotos")
        .upload(nome, file, { upsert: true });

      if (error) {
        throw new Error(error.message);
      }

      const { data } = client.storage.from("tickets-fotos").getPublicUrl(nome);

      return {
        foto_path: nome,
        foto_url: data.publicUrl
      };
    }

    async function criarTicket() {
      const solicitante = document.getElementById("solicitante").value.trim();
      const titulo = document.getElementById("titulo").value.trim();
      const descricao = document.getElementById("descricao").value.trim();
      const setor = document.getElementById("setor").value;
      const prioridade = document.getElementById("prioridade").value;
      const responsavel = document.getElementById("responsavel").value.trim();

      if (!solicitante || !titulo || !descricao) {
        mostrarMensagem("Preencha solicitante, título e descrição.", "red");
        return;
      }

      let foto = { foto_path: null, foto_url: null };
      try {
        foto = await uploadFotoSeExistir();
      } catch (e) {
        mostrarMensagem("Erro ao enviar foto: " + e.message, "red");
        return;
      }

      const { error } = await client.from("tickets").insert([
        {
          user_id: currentUser.id,
          user_email: currentProfile.email,
          solicitante,
          titulo,
          descricao,
          setor,
          prioridade,
          responsavel,
          status: "Aberto",
          foto_path: foto.foto_path,
          foto_url: foto.foto_url
        }
      ]);

      if (error) {
        mostrarMensagem("Erro ao salvar chamado: " + error.message, "red");
        return;
      }

      limparFormulario();
      mostrarMensagem("Chamado criado com sucesso.", "green");
      await listarTickets();
    }

    async function atualizarTicket() {
      if (!pedirSenhaAdmin()) {
        alert("Senha incorreta.");
        return;
      }

      const solicitante = document.getElementById("solicitante").value.trim();
      const titulo = document.getElementById("titulo").value.trim();
      const descricao = document.getElementById("descricao").value.trim();
      const setor = document.getElementById("setor").value;
      const prioridade = document.getElementById("prioridade").value;
      const responsavel = document.getElementById("responsavel").value.trim();

      const payload = {
        solicitante,
        titulo,
        descricao,
        setor,
        prioridade,
        responsavel
      };

      const file = document.getElementById("foto").files[0];
      if (file) {
        try {
          const foto = await uploadFotoSeExistir();
          payload.foto_path = foto.foto_path;
          payload.foto_url = foto.foto_url;
        } catch (e) {
          mostrarMensagem("Erro ao enviar foto: " + e.message, "red");
          return;
        }
      }

      const { error } = await client
        .from("tickets")
        .update(payload)
        .eq("id", ticketEditandoId);

      if (error) {
        mostrarMensagem("Erro ao atualizar chamado: " + error.message, "red");
        return;
      }

      mostrarMensagem("Chamado atualizado com sucesso.", "green");
      cancelarEdicao();
      await listarTickets();
    }

    function editarTicket(id) {
      if (!pedirSenhaAdmin()) {
        alert("Senha incorreta.");
        return;
      }

      const t = todosTickets.find(x => String(x.id) === String(id));
      if (!t) return;

      ticketEditandoId = id;
      document.getElementById("tituloFormulario").innerText = "Editar chamado";
      document.getElementById("btnSalvar").innerText = "Salvar alteração";
      document.getElementById("btnCancelar").classList.remove("hidden");

      document.getElementById("solicitante").value = t.solicitante || "";
      document.getElementById("titulo").value = t.titulo || "";
      document.getElementById("descricao").value = t.descricao || "";
      document.getElementById("setor").value = t.setor || "TI";
      document.getElementById("prioridade").value = t.prioridade || "Baixa";
      document.getElementById("responsavel").value = t.responsavel || "";

      const preview = document.getElementById("previewFoto");
      if (t.foto_url) {
        preview.src = t.foto_url;
        preview.classList.remove("hidden");
      } else {
        preview.src = "";
        preview.classList.add("hidden");
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function excluirTicket(id) {
      if (!pedirSenhaAdmin()) {
        alert("Senha incorreta.");
        return;
      }

      if (!confirm("Deseja excluir este chamado?")) return;

      const { error } = await client.from("tickets").delete().eq("id", id);

      if (error) {
        alert("Erro ao excluir chamado: " + error.message);
        return;
      }

      await listarTickets();
    }

    async function colocarEmAndamento(id) {
      const { error } = await client
        .from("tickets")
        .update({ status: "Em andamento" })
        .eq("id", id);

      if (error) {
        alert("Erro ao atualizar status: " + error.message);
        return;
      }

      await listarTickets();
    }

    async function reabrirTicket(id) {
      const { error } = await client
        .from("tickets")
        .update({
          status: "Aberto",
          data_fechamento: null,
          quem_atendeu: null,
          observacao_atendimento: null,
          peca_trocada: null,
          motivo_fechamento: null
        })
        .eq("id", id);

      if (error) {
        alert("Erro ao reabrir chamado: " + error.message);
        return;
      }

      await listarTickets();
    }

    async function finalizarTicket(id) {
      if (!pedirSenhaAdmin()) {
        alert("Senha incorreta.");
        return;
      }

      const quemAtendeu = prompt("Quem atendeu?");
      if (quemAtendeu === null) return;

      const observacao = prompt("O que foi feito?");
      if (observacao === null) return;

      const peca = prompt("Qual peça trocou? (se não trocou, deixe em branco)");
      if (peca === null) return;

      const motivo = prompt("Motivo do fechamento?");
      if (motivo === null) return;

      const { error } = await client
        .from("tickets")
        .update({
          status: "Finalizado",
          quem_atendeu: quemAtendeu,
          observacao_atendimento: observacao,
          peca_trocada: peca,
          motivo_fechamento: motivo,
          data_fechamento: new Date().toISOString()
        })
        .eq("id", id);

      if (error) {
        alert("Erro ao finalizar chamado: " + error.message);
        return;
      }

      await listarTickets();
    }

    function aplicarPeriodoRapido() {
      const valor = document.getElementById("filtroPeriodo").value;
      const hoje = new Date();

      function formatarData(d) {
        const ano = d.getFullYear();
        const mes = String(d.getMonth() + 1).padStart(2, "0");
        const dia = String(d.getDate()).padStart(2, "0");
        return `${ano}-${mes}-${dia}`;
      }

      let inicio = "";
      let fim = "";

      if (valor === "hoje") {
        inicio = formatarData(hoje);
        fim = formatarData(hoje);
      } else if (valor === "ontem") {
        const ontem = new Date();
        ontem.setDate(hoje.getDate() - 1);
        inicio = formatarData(ontem);
        fim = formatarData(ontem);
      } else if (valor === "semana") {
        const inicioSemana = new Date(hoje);
        inicioSemana.setDate(hoje.getDate() - hoje.getDay());
        inicio = formatarData(inicioSemana);
        fim = formatarData(hoje);
      } else if (valor === "mes") {
        const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
        inicio = formatarData(inicioMes);
        fim = formatarData(hoje);
      } else {
        document.getElementById("dataInicial").value = "";
        document.getElementById("dataFinal").value = "";
        listarTickets();
        return;
      }

      document.getElementById("dataInicial").value = inicio;
      document.getElementById("dataFinal").value = fim;
      listarTickets();
    }

    function dentroPeriodo(ticket) {
      const di = document.getElementById("dataInicial").value;
      const df = document.getElementById("dataFinal").value;
      if (!di && !df) return true;

      const data = new Date(ticket.created_at);
      const dataTexto = data.toISOString().slice(0, 10);

      if (di && dataTexto < di) return false;
      if (df && dataTexto > df) return false;
      return true;
    }

    function calcularTempo(ticket) {
      if (!ticket.created_at || !ticket.data_fechamento) return "";
      const inicio = new Date(ticket.created_at);
      const fim = new Date(ticket.data_fechamento);
      const ms = fim - inicio;
      const horas = Math.floor(ms / (1000 * 60 * 60));
      const minutos = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
      return `${horas}h ${minutos}min`;
    }

    function atualizarDashboard(lista) {
      document.getElementById("dashTotal").innerText = lista.length;
      document.getElementById("dashAbertos").innerText = lista.filter(t => t.status === "Aberto").length;
      document.getElementById("dashAndamento").innerText = lista.filter(t => t.status === "Em andamento").length;
      document.getElementById("dashFinalizados").innerText = lista.filter(t => t.status === "Finalizado").length;
      document.getElementById("dashAlta").innerText = lista.filter(t => t.prioridade === "Alta").length;

      const hoje = new Date().toISOString().slice(0, 10);
      document.getElementById("dashHoje").innerText = lista.filter(t => (t.created_at || "").slice(0, 10) === hoje).length;
    }

    async function listarTickets() {
      const { data, error } = await client
        .from("tickets")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        document.getElementById("listaTickets").innerHTML = "Erro ao carregar chamados: " + error.message;
        return;
      }

      todosTickets = data || [];

      const busca = document.getElementById("busca").value.trim().toLowerCase();
      const filtroStatus = document.getElementById("filtroStatus").value;
      const filtroSetor = document.getElementById("filtroSetor").value;

      const lista = todosTickets.filter(t => {
        const texto = (
          (t.numero_chamado || "") + " " +
          (t.titulo || "") + " " +
          (t.descricao || "") + " " +
          (t.setor || "") + " " +
          (t.solicitante || "") + " " +
          (t.responsavel || "")
        ).toLowerCase();

        const okBusca = !busca || texto.includes(busca);
        const okStatus = !filtroStatus || t.status === filtroStatus;
        const okSetor = !filtroSetor || t.setor === filtroSetor;
        const okPeriodo = dentroPeriodo(t);

        return okBusca && okStatus && okSetor && okPeriodo;
      });

      atualizarDashboard(lista);

      if (!lista.length) {
        document.getElementById("listaTickets").innerHTML = "Nenhum chamado encontrado.";
        return;
      }

      let html = "";

      lista.forEach(ticket => {
        const tempo = calcularTempo(ticket);
        const admin = currentProfile?.role === "admin";

        html += `
          <div class="ticket">
            <div>
              <span class="status ${classeStatus(ticket.status)}">${ticket.status || ""}</span>
              <span class="prioridade ${classePrioridade(ticket.prioridade)}">${ticket.prioridade || ""}</span>
            </div>

            <h3>${ticket.numero_chamado || ""} - ${ticket.titulo || ""}</h3>
            <p>${ticket.descricao || ""}</p>

            <div class="resumo">
              <strong>Solicitante:</strong> ${ticket.solicitante || ""}<br>
              <strong>Usuário:</strong> ${ticket.user_email || ""}<br>
              <strong>Setor:</strong> ${ticket.setor || ""}<br>
              <strong>Responsável:</strong> ${ticket.responsavel || ""}<br>
              <strong>Data de abertura:</strong> ${ticket.created_at ? new Date(ticket.created_at).toLocaleString("pt-BR") : ""}<br>
              <strong>Data de fechamento:</strong> ${ticket.data_fechamento ? new Date(ticket.data_fechamento).toLocaleString("pt-BR") : "-"}<br>
              <strong>Tempo de atendimento:</strong> ${tempo || "-"}<br>
              <strong>Quem atendeu:</strong> ${ticket.quem_atendeu || "-"}<br>
              <strong>Peça trocada:</strong> ${ticket.peca_trocada || "-"}<br>
              <strong>Motivo do fechamento:</strong> ${ticket.motivo_fechamento || "-"}<br>
              <strong>Observação de atendimento:</strong> ${ticket.observacao_atendimento || "-"}
            </div>

            ${ticket.foto_url ? `<div style="margin-top:10px;"><img src="${ticket.foto_url}" class="thumb" alt="Foto do chamado"></div>` : ""}

            <div class="acoes">
              ${admin ? `<button class="btn-yellow" onclick="colocarEmAndamento('${ticket.id}')">Em andamento</button>` : ""}
              ${admin ? `<button class="btn-green" onclick="finalizarTicket('${ticket.id}')">Finalizar</button>` : ""}
              ${admin ? `<button class="btn-gray" onclick="reabrirTicket('${ticket.id}')">Reabrir</button>` : ""}
              ${admin ? `<button class="btn-gray" onclick="editarTicket('${ticket.id}')">Editar</button>` : ""}
              ${admin ? `<button class="btn-red" onclick="excluirTicket('${ticket.id}')">Excluir</button>` : ""}
            </div>
          </div>
        `;
      });

      document.getElementById("listaTickets").innerHTML = html;
    }

    carregarSessao();
  </script>
</body>
</html>
