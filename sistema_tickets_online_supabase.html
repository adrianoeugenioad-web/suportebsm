<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPORTE BSM - VERSÃO 4</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f3f4f6; margin:0; }
.topo { background:#111827; color:#fff; padding:20px; }
.container { max-width:1200px; margin:auto; padding:20px; }
.card { background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; }
input, textarea, select { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc; }
button { padding:10px 15px; border:none; border-radius:8px; background:#111827; color:#fff; cursor:pointer; }
.ticket { background:#fafafa; padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid #ddd; }
.hidden { display:none; }
.thumb { max-width:200px; margin-top:10px; border-radius:10px; }
</style>
</head>

<body>

<div class="topo">
<h2>SUPORTE BSM</h2>
</div>

<div class="container">

<div id="authBox" class="card">
<h3>Login</h3>
<input type="text" id="cadNome" placeholder="Nome (para cadastro)">
<input type="email" id="authEmail" placeholder="Email">
<input type="password" id="authSenha" placeholder="Senha">
<button onclick="registrar()">Criar conta</button>
<button onclick="entrar()">Entrar</button>
<div id="authMsg"></div>
</div>

<div id="appBox" class="hidden">

<div class="card">
<b id="userInfo"></b>
<button onclick="sair()">Sair</button>
</div>

<div class="card">
<h3>Abrir Chamado</h3>
<input type="text" id="solicitante" placeholder="Solicitante">
<input type="text" id="titulo" placeholder="Título">
<textarea id="descricao" placeholder="Descrição"></textarea>
<select id="setor">
<option>TI</option>
<option>Manutenção</option>
<option>Frota</option>
<option>Compras</option>
<option>RH</option>
<option>Produção</option>
<option>Estoque</option>
</select>
<select id="prioridade">
<option>Baixa</option>
<option>Média</option>
<option>Alta</option>
</select>
<input type="text" id="responsavel" placeholder="Responsável">
<input type="file" id="foto">
<img id="previewFoto" class="thumb hidden">
<button onclick="criarTicket()">Salvar Chamado</button>
<div id="msg"></div>
</div>

<div class="card">
<h3>Chamados</h3>
<div id="listaTickets"></div>
</div>

</div>
</div>

<script>
const SUPABASE_URL = "https://xzxcxalmarshffueylxw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Q1EXGzQ7WjCXwdgLjyGhFQ_pTu5QFYX";
const SENHA_ADMIN = "2101";

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;

document.getElementById("foto").addEventListener("change", e=>{
 const file = e.target.files[0];
 const img = document.getElementById("previewFoto");
 if(file){
   img.src = URL.createObjectURL(file);
   img.classList.remove("hidden");
 }
});

function msg(t,c="green"){
 document.getElementById("msg").innerText=t;
 document.getElementById("msg").style.color=c;
}

function pedirSenha(){
 return prompt("Senha admin:")==SENHA_ADMIN;
}

async function registrar(){
 const nome = cadNome.value;
 const email = authEmail.value;
 const senha = authSenha.value;

 const { data, error } = await client.auth.signUp({ email, password: senha });
 if(error){ authMsg.innerText=error.message; return; }

 await client.from("profiles").upsert({
   id:data.user.id,
   email:email,
   full_name:nome,
   role:"usuario"
 });

 authMsg.innerText="Conta criada. Faça login.";
}

async function entrar(){
 const email = authEmail.value;
 const senha = authSenha.value;

 const { error } = await client.auth.signInWithPassword({ email, password: senha });
 if(error){ authMsg.innerText=error.message; return; }

 carregarSessao();
}

async function sair(){
 await client.auth.signOut();
 location.reload();
}

async function carregarSessao(){
 const { data } = await client.auth.getSession();
 if(!data.session) return;

 currentUser = data.session.user;

 const { data:profileRows } = await client
   .from("profiles")
   .select("*")
   .eq("id", currentUser.id)
   .limit(1);

 if(!profileRows.length){
   alert("Perfil não encontrado no banco.");
   return;
 }

 currentProfile = profileRows[0];

 authBox.classList.add("hidden");
 appBox.classList.remove("hidden");

 userInfo.innerText = currentProfile.full_name + " | " + currentProfile.role;

 listarTickets();
}

async function uploadFoto(){
 const file = foto.files[0];
 if(!file) return {url:null,path:null};

 const nome = currentUser.id+"/"+Date.now()+".jpg";
 await client.storage.from("tickets-fotos").upload(nome,file,{upsert:true});
 const { data } = client.storage.from("tickets-fotos").getPublicUrl(nome);

 return {url:data.publicUrl,path:nome};
}

async function criarTicket(){
 const f = await uploadFoto();

 const { error } = await client.from("tickets").insert([{
   user_id: currentUser.id,
   user_email: currentUser.email,
   solicitante: solicitante.value,
   titulo: titulo.value,
   descricao: descricao.value,
   setor: setor.value,
   prioridade: prioridade.value,
   responsavel: responsavel.value,
   status:"Aberto",
   foto_url:f.url,
   foto_path:f.path
 }]);

 if(error){ msg(error.message,"red"); return; }

 msg("Chamado criado!");
 listarTickets();
}

async function listarTickets(){
 const { data } = await client.from("tickets").select("*").order("created_at",{ascending:false});

 let html="";
 data.forEach(t=>{
 html+=`
 <div class="ticket">
 <b>${t.numero_chamado}</b> - ${t.titulo}<br>
 ${t.descricao}<br>
 Status: ${t.status}<br>
 ${t.foto_url?`<img src="${t.foto_url}" class="thumb">`:""}
 <br>
 ${currentProfile.role=="admin"?`
 <button onclick="finalizar(${t.id})">Finalizar</button>
 <button onclick="excluir(${t.id})">Excluir</button>
 `:""}
 </div>
 `;
 });

 listaTickets.innerHTML=html;
}

async function finalizar(id){
 if(!pedirSenha()) return;
 await client.from("tickets").update({status:"Finalizado",data_fechamento:new Date()}).eq("id",id);
 listarTickets();
}

async function excluir(id){
 if(!pedirSenha()) return;
 await client.from("tickets").delete().eq("id",id);
 listarTickets();
}

carregarSessao();
</script>

</body>
</html>
