<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUPORTE BSM - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
    }
    .topo {
      background: #0b1f3a;
      color: white;
      padding: 16px;
      font-size: 22px;
      font-weight: bold;
    }
    .box {
      max-width: 420px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 11px;
      background: #0b1f3a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #163a6b;
    }
    .msg {
      margin-top: 12px;
      font-weight: bold;
    }
    .ok {
      color: green;
    }
    .erro {
      color: red;
    }
    .hidden {
      display: none;
    }
    .painel {
      max-width: 700px;
      margin: 20px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <div class="topo">SUPORTE BSM</div>

  <div id="loginBox" class="box">
    <h2>Login</h2>

    <label>Usuário</label>
    <input type="text" id="usuario" placeholder="Ex.: Adriano" />

    <label>Senha</label>
    <input type="password" id="senha" placeholder="Sua senha" />

    <button onclick="login()">Entrar</button>

    <div id="msgLogin" class="msg"></div>
  </div>

  <div id="painelBox" class="painel hidden">
    <h2>Login realizado com sucesso</h2>
    <p><strong>Usuário:</strong> <span id="nomeUsuario"></span></p>
    <p><strong>Email:</strong> <span id="emailUsuario"></span></p>
    <p><strong>Perfil:</strong> <span id="perfilUsuario"></span></p>
    <button onclick="logout()">Sair</button>
  </div>

  <script>
  const SUPABASE_URL = "https://xzxcxalmarshffueylxw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Q1EXGzQ7WjCXwdgLjyGhFQ_pTu5QFYX";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function mostrarMsg(texto, tipo = "erro") {
      const el = document.getElementById("msgLogin");
      el.innerText = texto;
      el.className = "msg " + (tipo === "ok" ? "ok" : "erro");
    }

    async function login() {
      const usuarioDigitado = document.getElementById("usuario").value.trim();
      const senha = document.getElementById("senha").value;

      if (!usuarioDigitado || !senha) {
        mostrarMsg("Informe usuário e senha.");
        return;
      }

      const { data, error } = await client
        .from("profiles")
        .select("username, email, role, full_name")
        .ilike("username", usuarioDigitado)
        .limit(1);

      if (error) {
        mostrarMsg("Erro ao consultar profiles: " + error.message);
        return;
      }

      if (!data || !data.length) {
        mostrarMsg("Usuário não encontrado.");
        return;
      }

      const perfil = data[0];

      const { error: erroLogin } = await client.auth.signInWithPassword({
        email: perfil.email,
        password: senha
      });

      if (erroLogin) {
        mostrarMsg("Senha inválida.");
        return;
      }

      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("painelBox").classList.remove("hidden");

      document.getElementById("nomeUsuario").innerText =
        perfil.full_name || perfil.username || "-";
      document.getElementById("emailUsuario").innerText = perfil.email || "-";
      document.getElementById("perfilUsuario").innerText = perfil.role || "-";
    }

    async function logout() {
      await client.auth.signOut();
      location.reload();
    }
  </script>
</body>
</html>
