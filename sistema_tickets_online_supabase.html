<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SUPORTE BSM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
}

.topo {
  background: #0b1f3a;
  color: white;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #0b1f3a;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #163a6b;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

table th, table td {
  padding: 8px;
  border: 1px solid #ddd;
  text-align: left;
}

.menu {
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="topo">SUPORTE BSM</div>

<div class="container">

<div id="loginBox" class="card">
  <h3>Login</h3>

  <label>Usuário</label>
  <input type="text" id="usuario">

  <label>Senha</label>
  <input type="password" id="senha">

  <button onclick="login()">Entrar</button>

  <div id="msgLogin" style="color:red; margin-top:10px;"></div>
</div>

<div id="sistema" style="display:none;">
  <div class="menu">
    <button onclick="novoChamado()">Novo Chamado</button>
    <button onclick="listarChamados()">Meus Chamados</button>
    <button onclick="listarTodos()" id="btnTodos" style="display:none;">Todos Chamados</button>
    <button onclick="logout()">Sair</button>
  </div>

  <div id="conteudo"></div>
</div>

</div>

<script>
const SUPABASE_URL = "https://xzxcxalmarshffueylxw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Q1EXGzQ7WjCXwdgLjyGhFQ_pTu5QFYX";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let usuarioLogado = null;
let role = null;

// LOGIN
async function login() {
  const usuario = document.getElementById("usuario").value.toLowerCase();
  const senha = document.getElementById("senha").value;

  const { data } = await client
    .from("profiles")
    .select("*")
    .eq("username", usuario)
    .single();

  if (!data) {
    document.getElementById("msgLogin").innerText = "Usuário não encontrado";
    return;
  }

  const { error } = await client.auth.signInWithPassword({
    email: data.email,
    password: senha
  });

  if (error) {
    document.getElementById("msgLogin").innerText = "Senha inválida";
    return;
  }

  usuarioLogado = data.username;
  role = data.role;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("sistema").style.display = "block";

  if (role == "admin") {
    document.getElementById("btnTodos").style.display = "inline-block";
  }

  listarChamados();
}

// LOGOUT
async function logout() {
  await client.auth.signOut();
  location.reload();
}

// NOVO CHAMADO
function novoChamado() {
  document.getElementById("conteudo").innerHTML = `
    <h3>Novo Chamado</h3>

    <label>Título</label>
    <input type="text" id="titulo">

    <label>Descrição</label>
    <textarea id="descricao"></textarea>

    <label>Prioridade</label>
    <select id="prioridade">
      <option>Baixa</option>
      <option>Média</option>
      <option>Alta</option>
    </select>

    <label>Anexo (foto)</label>
    <input type="file" id="anexo">

    <button onclick="salvarChamado()">Salvar</button>
  `;
}

// SALVAR CHAMADO
async function salvarChamado() {
  const titulo = document.getElementById("titulo").value;
  const descricao = document.getElementById("descricao").value;
  const prioridade = document.getElementById("prioridade").value;

  let numero = "BSM-" + Math.floor(Math.random() * 10000);

  const { error } = await client.from("tickets").insert([
    {
      numero: numero,
      titulo: titulo,
      descricao: descricao,
      prioridade: prioridade,
      status: "Aberto",
      usuario: usuarioLogado
    }
  ]);

  if (!error) {
    alert("Chamado criado: " + numero);
    listarChamados();
  } else {
    alert("Erro ao salvar");
  }
}

// LISTAR MEUS
async function listarChamados() {
  const { data } = await client
    .from("tickets")
    .select("*")
    .eq("usuario", usuarioLogado)
    .order("id", { ascending: false });

  montarTabela(data);
}

// LISTAR TODOS (ADMIN)
async function listarTodos() {
  const { data } = await client
    .from("tickets")
    .select("*")
    .order("id", { ascending: false });

  montarTabela(data);
}

// TABELA
function montarTabela(data) {
  let html = `
    <table>
      <tr>
        <th>Nº</th>
        <th>Título</th>
        <th>Prioridade</th>
        <th>Status</th>
        <th>Usuário</th>
      </tr>
  `;

  data.forEach(t => {
    html += `
      <tr>
        <td>${t.numero}</td>
        <td>${t.titulo}</td>
        <td>${t.prioridade}</td>
        <td>${t.status}</td>
        <td>${t.usuario}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}
</script>

</body>
</html>
