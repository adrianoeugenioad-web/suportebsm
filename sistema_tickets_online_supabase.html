<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUPORTE BSM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    .topo {
      background: #111827;
      color: white;
      padding: 20px;
    }
    .topo h1 {
      margin: 0;
      font-size: 32px;
    }
    .topo p {
      margin: 6px 0 0;
      color: #d1d5db;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .contador {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .box {
      background: white;
      padding: 14px 18px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      min-width: 150px;
    }
    .box strong {
      display: block;
      font-size: 26px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      padding: 20px;
    }
    h2, h3 {
      margin-top: 0;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    button {
      background: #111827;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    button:hover {
      opacity: 0.94;
    }
    .btn-sec { background: #374151; }
    .btn-green { background: #15803d; }
    .btn-yellow { background: #b45309; }
    .btn-red { background: #b91c1c; }
    .msg {
      margin-top: 10px;
      font-weight: bold;
    }
    .ticket {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fafafa;
    }
    .status {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-right: 8px;
    }
    .aberto { background: #dbeafe; color: #1d4ed8; }
    .andamento { background: #fef3c7; color: #b45309; }
    .finalizado { background: #dcfce7; color: #15803d; }
    .prioridade {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }
    .baixa { background: #e5e7eb; color: #374151; }
    .media { background: #cffafe; color: #0f766e; }
    .alta { background: #fee2e2; color: #b91c1c; }
    .acoes {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topo">
    <h1>SUPORTE BSM</h1>
    <p>Sistema interno de tickets</p>
  </div>

  <div class="container">
    <div class="contador">
      <div class="box"><span>Total</span><strong id="totalTickets">0</strong></div>
      <div class="box"><span>Abertos</span><strong id="totalAbertos">0</strong></div>
      <div class="box"><span>Em andamento</span><strong id="totalAndamento">0</strong></div>
      <div class="box"><span>Finalizados</span><strong id="totalFinalizados">0</strong></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2 id="formTitulo">Abrir novo ticket</h2>

        <label>Solicitante</label>
        <input type="text" id="solicitante" placeholder="Nome de quem está abrindo o chamado" />

        <label>Título</label>
        <input type="text" id="titulo" placeholder="Ex.: Impressora não está funcionando" />

        <label>Descrição</label>
        <textarea id="descricao" placeholder="Descreva o problema"></textarea>

        <label>Setor</label>
        <select id="setor">
          <option value="TI">TI</option>
          <option value="Manutenção">Manutenção</option>
          <option value="Frota">Frota</option>
          <option value="Compras">Compras</option>
          <option value="RH">RH</option>
          <option value="Produção">Produção</option>
          <option value="Estoque">Estoque</option>
        </select>

        <label>Prioridade</label>
        <select id="prioridade">
          <option value="Baixa">Baixa</option>
          <option value="Média">Média</option>
          <option value="Alta">Alta</option>
        </select>

        <label>Responsável</label>
        <input type="text" id="responsavel" placeholder="Nome do responsável" />

        <button id="btnSalvar" onclick="salvarOuAtualizarTicket()">Salvar ticket</button>
        <button id="btnCancelarEdicao" class="btn-sec hidden" onclick="cancelarEdicao()">Cancelar edição</button>

        <div id="mensagem" class="msg"></div>
      </div>

      <div class="card">
        <h2>Filtrar tickets</h2>

        <label>Buscar</label>
        <input type="text" id="busca" placeholder="Buscar por título, solicitante ou setor" onkeyup="listarTickets()" />

        <label>Status</label>
        <select id="filtroStatus" onchange="listarTickets()">
          <option value="">Todos</option>
          <option value="Aberto">Aberto</option>
          <option value="Em andamento">Em andamento</option>
          <option value="Finalizado">Finalizado</option>
        </select>

        <label>Setor</label>
        <select id="filtroSetor" onchange="listarTickets()">
          <option value="">Todos</option>
          <option value="TI">TI</option>
          <option value="Manutenção">Manutenção</option>
          <option value="Frota">Frota</option>
          <option value="Compras">Compras</option>
          <option value="RH">RH</option>
          <option value="Produção">Produção</option>
          <option value="Estoque">Estoque</option>
        </select>

        <button class="btn-sec" onclick="listarTickets()">Atualizar lista</button>
        <button class="btn-yellow" onclick="liberarVisualizacao()">Ver tickets cadastrados</button>
      </div>
    </div>

    <div class="card" style="margin-top:20px;">
      <h2>Tickets cadastrados</h2>
      <div id="bloqueioLista">Área protegida. Clique em <strong>Ver tickets cadastrados</strong> e informe a senha.</div>
      <div id="listaTickets" class="hidden">Carregando...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xzxcxalmarshffueylxw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Q1EXGzQ7WjCXwdgLjyGhFQ_pTu5QFYX";
    const SENHA_PROTECAO = "2101";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let ticketsCarregados = [];
    let ticketEditandoId = null;
    let listaLiberada = false;

    function mostrarMensagem(texto, cor = "green") {
      const el = document.getElementById("mensagem");
      el.innerText = texto;
      el.style.color = cor;
    }

    function classeStatus(status) {
      if (status === "Aberto") return "aberto";
      if (status === "Em andamento") return "andamento";
      if (status === "Finalizado") return "finalizado";
      return "";
    }

    function classePrioridade(prioridade) {
      if (prioridade === "Baixa") return "baixa";
      if (prioridade === "Média") return "media";
      if (prioridade === "Alta") return "alta";
      return "";
    }

    function pedirSenha() {
      const senha = prompt("Digite a senha:");
      return senha === SENHA_PROTECAO;
    }

    function limparFormulario() {
      document.getElementById("solicitante").value = "";
      document.getElementById("titulo").value = "";
      document.getElementById("descricao").value = "";
      document.getElementById("setor").value = "TI";
      document.getElementById("prioridade").value = "Baixa";
      document.getElementById("responsavel").value = "";
    }

    function cancelarEdicao() {
      ticketEditandoId = null;
      document.getElementById("formTitulo").innerText = "Abrir novo ticket";
      document.getElementById("btnSalvar").innerText = "Salvar ticket";
      document.getElementById("btnCancelarEdicao").classList.add("hidden");
      limparFormulario();
      mostrarMensagem("");
    }

    async function salvarOuAtualizarTicket() {
      if (ticketEditandoId) {
        await atualizarTicket();
      } else {
        await criarTicket();
      }
    }

    async function criarTicket() {
      const solicitante = document.getElementById("solicitante").value.trim();
      const titulo = document.getElementById("titulo").value.trim();
      const descricao = document.getElementById("descricao").value.trim();
      const setor = document.getElementById("setor").value;
      const prioridade = document.getElementById("prioridade").value;
      const responsavel = document.getElementById("responsavel").value.trim();

      if (!solicitante || !titulo || !descricao) {
        mostrarMensagem("Preencha solicitante, título e descrição.", "red");
        return;
      }

      const { error } = await client.from("tickets").insert([
        {
          titulo,
          descricao,
          setor,
          prioridade,
          responsavel,
          status: "Aberto",
          solicitante
        }
      ]);

      if (error) {
        mostrarMensagem("Erro ao salvar ticket: " + error.message, "red");
        console.error(error);
        return;
      }

      limparFormulario();
      mostrarMensagem("Ticket criado com sucesso.", "green");
      if (listaLiberada) {
        listarTickets();
      }
    }

    async function atualizarTicket() {
      if (!pedirSenha()) {
        alert("Senha incorreta.");
        return;
      }

      const solicitante = document.getElementById("solicitante").value.trim();
      const titulo = document.getElementById("titulo").value.trim();
      const descricao = document.getElementById("descricao").value.trim();
      const setor = document.getElementById("setor").value;
      const prioridade = document.getElementById("prioridade").value;
      const responsavel = document.getElementById("responsavel").value.trim();

      const { error } = await client
        .from("tickets")
        .update({
          solicitante,
          titulo,
          descricao,
          setor,
          prioridade,
          responsavel
        })
        .eq("id", ticketEditandoId);

      if (error) {
        mostrarMensagem("Erro ao atualizar ticket: " + error.message, "red");
        console.error(error);
        return;
      }

      mostrarMensagem("Ticket atualizado com sucesso.", "green");
      cancelarEdicao();
      if (listaLiberada) {
        listarTickets();
      }
    }

    function editarTicket(id) {
      if (!pedirSenha()) {
        alert("Senha incorreta.");
        return;
      }

      const ticket = ticketsCarregados.find(t => String(t.id) === String(id));
      if (!ticket) return;

      ticketEditandoId = id;
      document.getElementById("formTitulo").innerText = "Editar ticket";
      document.getElementById("btnSalvar").innerText = "Salvar alteração";
      document.getElementById("btnCancelarEdicao").classList.remove("hidden");

      document.getElementById("solicitante").value = ticket.solicitante || "";
      document.getElementById("titulo").value = ticket.titulo || "";
      document.getElementById("descricao").value = ticket.descricao || "";
      document.getElementById("setor").value = ticket.setor || "TI";
      document.getElementById("prioridade").value = ticket.prioridade || "Baixa";
      document.getElementById("responsavel").value = ticket.responsavel || "";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function excluirTicket(id) {
      if (!pedirSenha()) {
        alert("Senha incorreta.");
        return;
      }

      if (!confirm("Deseja excluir este ticket?")) return;

      const { error } = await client
        .from("tickets")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Erro ao excluir ticket: " + error.message);
        console.error(error);
        return;
      }

      listarTickets();
    }

    async function alterarStatus(id, novoStatus) {
      if (novoStatus === "Finalizado") {
        if (!pedirSenha()) {
          alert("Senha incorreta.");
          return;
        }
      }

      const { error } = await client
        .from("tickets")
        .update({ status: novoStatus })
        .eq("id", id);

      if (error) {
        alert("Erro ao atualizar status: " + error.message);
        console.error(error);
        return;
      }

      listarTickets();
    }

    function liberarVisualizacao() {
      if (!pedirSenha()) {
        alert("Senha incorreta.");
        return;
      }

      listaLiberada = true;
      document.getElementById("bloqueioLista").classList.add("hidden");
      document.getElementById("listaTickets").classList.remove("hidden");
      listarTickets();
    }

    async function listarTickets() {
      if (!listaLiberada) return;

      const busca = document.getElementById("busca").value.trim().toLowerCase();
      const filtroStatus = document.getElementById("filtroStatus").value;
      const filtroSetor = document.getElementById("filtroSetor").value;

      const { data, error } = await client
        .from("tickets")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        document.getElementById("listaTickets").innerHTML = "Erro ao carregar tickets: " + error.message;
        console.error(error);
        return;
      }

      ticketsCarregados = data || [];

      let tickets = [...ticketsCarregados];

      tickets = tickets.filter(ticket => {
        const texto = (
          (ticket.titulo || "") + " " +
          (ticket.descricao || "") + " " +
          (ticket.setor || "") + " " +
          (ticket.solicitante || "") + " " +
          (ticket.responsavel || "")
        ).toLowerCase();

        const okBusca = !busca || texto.includes(busca);
        const okStatus = !filtroStatus || ticket.status === filtroStatus;
        const okSetor = !filtroSetor || ticket.setor === filtroSetor;

        return okBusca && okStatus && okSetor;
      });

      document.getElementById("totalTickets").innerText = tickets.length;
      document.getElementById("totalAbertos").innerText = tickets.filter(t => t.status === "Aberto").length;
      document.getElementById("totalAndamento").innerText = tickets.filter(t => t.status === "Em andamento").length;
      document.getElementById("totalFinalizados").innerText = tickets.filter(t => t.status === "Finalizado").length;

      if (!tickets.length) {
        document.getElementById("listaTickets").innerHTML = "Nenhum ticket encontrado.";
        return;
      }

      let html = "";

      tickets.forEach(ticket => {
        html += `
          <div class="ticket">
            <div>
              <span class="status ${classeStatus(ticket.status)}">${ticket.status || ""}</span>
              <span class="prioridade ${classePrioridade(ticket.prioridade)}">${ticket.prioridade || ""}</span>
            </div>
            <h3>${ticket.titulo || ""}</h3>
            <p>${ticket.descricao || ""}</p>
            <p><strong>Solicitante:</strong> ${ticket.solicitante || ""}</p>
            <p><strong>Setor:</strong> ${ticket.setor || ""}</p>
            <p><strong>Responsável:</strong> ${ticket.responsavel || ""}</p>
            <p><strong>Data:</strong> ${ticket.created_at ? new Date(ticket.created_at).toLocaleString("pt-BR") : ""}</p>

            <div class="acoes">
              <button class="btn-yellow" onclick="alterarStatus('${ticket.id}', 'Em andamento')">Em andamento</button>
              <button class="btn-green" onclick="alterarStatus('${ticket.id}', 'Finalizado')">Finalizar</button>
              <button class="btn-sec" onclick="alterarStatus('${ticket.id}', 'Aberto')">Reabrir</button>
              <button class="btn-sec" onclick="editarTicket('${ticket.id}')">Editar</button>
              <button class="btn-red" onclick="excluirTicket('${ticket.id}')">Excluir</button>
            </div>
          </div>
        `;
      });

      document.getElementById("listaTickets").innerHTML = html;
    }
  </script>
</body>
</html>
